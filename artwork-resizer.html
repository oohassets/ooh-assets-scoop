<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Resizer Tool</title>

<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        margin: 0;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 900px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 24px;
    }

    .upload {
        border: 2px dashed rgba(255,255,255,0.2);
        padding: 30px;
        text-align: center;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .upload:hover {
        border-color: #38bdf8;
        background: rgba(56,189,248,0.1);
    }

    input[type="file"] {
        display: none;
    }

    .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    select, input, button {
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    select, input {
        flex: 1;
    }

    button {
        background: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
    }

    .preview {
        margin-top: 20px;
        text-align: center;
    }

    img, video {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 10px;
    }

    .info {
        margin-top: 10px;
        font-size: 14px;
        color: #94a3b8;
    }
</style>
</head>

<body>

<div class="container">
    <h1>📐 Media Resizer Tool</h1>

    <label class="upload">
        Upload Image / Video
        <input type="file" id="fileInput" accept="image/*,video/*">
    </label>

    <div class="controls">
        <select id="preset">
            <option value="">Select Preset</option>
            <option value="3670">Resize to 3670 width (for 6240x420)</option>
            <option value="2816">Resize to 2816 width (for 6656x1040)</option>
        </select>

        <input type="number" id="customWidth" placeholder="Or Enter Custom Width">

        <button onclick="resizeMedia()">Resize</button>
    </div>

    <div class="preview" id="preview"></div>
</div>

<script type="module">
import { createFFmpeg, fetchFile } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js";

let ffmpeg;
let file, originalWidth, originalHeight;

async function initFFmpeg() {
    if (!ffmpeg) {
        ffmpeg = createFFmpeg({ log: true });
    }
    if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
    }
}

window.initFFmpeg = initFFmpeg;
window.fetchFile = fetchFile;
window.ffmpegRef = () => ffmpeg;
</script>

<script>
let ffmpeg;
let file, originalWidth, originalHeight;

async function initFFmpeg() {
    if (!ffmpeg) {
        ffmpeg = FFmpeg.createFFmpeg({ log: true });
    }
    if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
    }
}

document.getElementById("fileInput").addEventListener("change", function(e) {
    file = e.target.files[0];
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    if (!file) return;

    const url = URL.createObjectURL(file);

    if (file.type.startsWith("image")) {
        const img = new Image();
        img.src = url;

        img.onload = () => {
            originalWidth = img.width;
            originalHeight = img.height;

            preview.innerHTML = `
                <img src="${url}">
                <div class="info">Original: ${originalWidth} x ${originalHeight}</div>
            `;
        };

    } else if (file.type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;

        video.onloadedmetadata = () => {
            originalWidth = video.videoWidth;
            originalHeight = video.videoHeight;

            preview.innerHTML = `
                <video src="${url}" controls></video>
                <div class="info">Original: ${originalWidth} x ${originalHeight}</div>
            `;
        };
    }
});

async function resizeMedia() {
    try {
        if (!file) return alert("Upload file first!");

        let width = document.getElementById("preset").value || 
                    document.getElementById("customWidth").value;

        if (!width) return alert("Select or enter width!");

        width = parseInt(width);
        const height = Math.round((originalHeight / originalWidth) * width);

        const preview = document.getElementById("preview");

        // Extract filename (without extension)
        const originalName = file.name.replace(/\.[^/.]+$/, "");

        // ================= IMAGE =================
        if (file.type.startsWith("image")) {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = width;
            canvas.height = height;

            const img = new Image();
            img.src = URL.createObjectURL(file);

            img.onload = () => {
                ctx.drawImage(img, 0, 0, width, height);

                // ✅ Export as JPEG (high quality)
                const resizedData = canvas.toDataURL("image/jpeg", 0.95);

                const fileName = `${originalName}_${width}x${height}.jpg`;

                preview.innerHTML = `
                    <img src="${resizedData}">
                    <div class="info">Resized: ${width} x ${height}</div>
                    <a href="${resizedData}" download="${fileName}">
                        <button>Download Image</button>
                    </a>
                `;
            };
        } 
        
        // ================= VIDEO =================
        else {
            preview.innerHTML = `<div class="info">⏳ Processing video...</div>`;

            await initFFmpeg();

            const inputExt = file.name.split('.').pop();
            const inputName = "input." + inputExt;
            const outputName = "output.mp4";

            ffmpeg.FS("writeFile", inputName, await FFmpeg.fetchFile(file));

            // ✅ High-quality MP4 export
            await ffmpeg.run(
                "-i", inputName,
                "-vf", `scale=${width}:${height}`,
                "-c:v", "libx264",
                "-crf", "18",          // 🔥 higher quality (lower = better)
                "-preset", "medium",
                "-c:a", "aac",
                "-b:a", "192k",
                "-movflags", "faststart",
                outputName
            );

            const data = ffmpeg.FS("readFile", outputName);

            const videoURL = URL.createObjectURL(
                new Blob([data.buffer], { type: "video/mp4" })
            );

            const fileName = `${originalName}_${width}x${height}.mp4`;

            preview.innerHTML = `
                <video src="${videoURL}" controls></video>
                <div class="info">Resized: ${width} x ${height}</div>
                <a href="${videoURL}" download="${fileName}">
                    <button>Download Video</button>
                </a>
            `;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("preview").innerHTML = `
            <div class="info">❌ Error processing file.</div>
        `;
    }
}
</script>

</body>
</html>
