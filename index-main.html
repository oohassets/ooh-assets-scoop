<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOOP Assets Map</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}


/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    height: 65px;
    background: #fff;
    border-bottom: 1px solid #ddd;
}

.logo { height: 50px; }

.nav-center {
    display: flex;
    gap: 35px;
}

.nav-item { position: relative; }

.nav-link {
    text-decoration: none;
    color: #333;
    font-size: 14px;
    position: relative;
    padding: 8px 0;
    cursor: pointer;
}

/* SLIDING BAR */
.nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    height: 3px;
    width: 100%;
    background: orange;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
}

.nav-link.active::after {
    transform: scaleX(1);
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 120%;
    left: 0;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    border-radius: 10px;
    min-width: 280px;
    padding: 8px;
    display: none;
    flex-direction: column;
}

.dropdown a {
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 6px;
    text-decoration: none;
    color: #333;
    font-size: 13px;
}

.dropdown a:hover { background: #f3f3f3; }

.map-container {
    position: relative;
}

.map-container {
    position: relative;
}

/* overlay container */
.map-overlay {
  position:absolute; 
  background:#4d6a79; 
  opacity:1; 
}

.hide-top-right {
  top:0;
  right:0;
  width:140px;
  height:50px;
  pointer-events:auto; 
}

/* button style matching iframe feel */
.share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
     position:absolute;
  top:10px;
  right:20px;
  background:transparent;
  padding:.25rem .5rem;
border: none;
}

.share-btn img {
    width:25px;
    height: 25px;
    display: block;
    margin: auto;
}

.share-btn:hover {
    transform: scale(1.05);
}

@media (min-width: 769px) {
    .dropdown-parent:hover .dropdown { display: flex; }
}

.nav-right { font-size: 14px; }

.hamburger {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* MAP */
.map-container {
    height: calc(100vh - 65px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media (max-width: 768px) {

    .hamburger { display: block; }

    .nav-center {
        position: absolute;
        top: 65px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        display: none;
    }

    .nav-center.active { display: flex; }

    .nav-link { padding: 10px; display: block; }

    .dropdown {
        position: static;
        display: none;
        border: none;
    }

    .dropdown-parent.open .dropdown { display: flex; }
}
</style>
</head>

<body>

<nav class="navbar">
    <img src="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo.png" class="logo">

    <div class="hamburger" id="hamburger">☰</div>

    <div class="nav-center" id="navMenu">

        <!-- ✅ FIXED: Content Inventory -->
        <div class="nav-item">
            <a class="nav-link"
               id="contentInventoryLink"
               onclick="openContentInventory()">
                Content Inventory
            </a>
        </div>

        <div class="nav-item dropdown-parent">
            <a class="nav-link" data-map="assets-all" onclick="setMap('assets-all')">Assets Map</a>
            <div class="dropdown">
                <a data-map="mupi-all" onclick="setMap('mupi-all')">TPI - Mupi All Circuit</a>
                <a data-map="mupi-c1" onclick="setMap('mupi-c1')">TPI Mupi Circuit 1</a>
                <a data-map="mupi-c2" onclick="setMap('mupi-c2')">TPI Mupi Circuit 2</a>

                <a data-map="gewan-all" onclick="setMap('gewan-all')">Gewan Crystal Walk All Circuit</a>
                <a data-map="gewan-c1" onclick="setMap('gewan-c1')">Gewan Circuit 1</a>
                <a data-map="gewan-c2" onclick="setMap('gewan-c2')">Gewan Circuit 2</a>
            </div>
        </div>

        <!-- ✅ FIXED: Vehicle Traffic Report -->
        <div class="nav-item">
        <a class="nav-link"
        id="vehicleTrafficLink"
        onclick="openVehicleReport()">
        Vehicle Traffic Report
        </a>
        </div>
        


    </div>

    <div class="nav-right">Admin</div>
</nav>

<div class="map-container">

<div class="map-overlay hide-top-right">
    <button class="share-btn" onclick="copyGoogleMapLink()" title="Copy Map Link">
        <img 
            src="https://img.icons8.com/?size=100&id=98959&format=png&color=ffffff" 
            alt="Share"
        >
    </button>
</div>

    <!-- MAP IFRAME -->
    <iframe id="mapFrame"></iframe>

    <!-- VEHICLE TRAFFIC REPORT IFRAME -->
    <iframe id="vehicleFrame" style="display:none;"
        src="https://oohassets.github.io/ooh-assets-scoop/vehicle-traffic-report.html">
    </iframe>
    <!-- CONTENT INVENTORY IFRAME -->
    <iframe id="contentInventoryFrame" style="display:none;"
        src="https://oohassets.github.io/ooh-assets-scoop/index.html">
    </iframe>                   
</div>

<script>

let currentMapKey = "assets-all";

// MAP LIST
const maps = {
    "assets-all": "https://www.google.com/maps/d/u/0/embed?mid=1O9QdapVXTxIAc27SDk8ELyLVISIOVB4&noprof=1&hl=en",
    "mupi-all": "https://www.google.com/maps/d/u/0/embed?mid=1vOMNPiS5Y-HrRRHCR1KcJhUcXn9xwEw&noprof=1&hl=en",
    "mupi-c1": "https://www.google.com/maps/d/u/0/embed?mid=1BrVkhO1Lg0HRAKHpGeH74zEDztPX-pE&noprof=1&hl=en",
    "mupi-c2": "https://www.google.com/maps/d/u/0/embed?mid=1MajcJPKIVulbFbP5yotE1NxGdhElf_k&noprof=1&hl=en",
    "gewan-all": "https://www.google.com/maps/d/u/0/embed?mid=1SFDoLXZLLc2-B3se_7_qjfZcf2ZYNDs&noprof=1&hl=en",
    "gewan-c1": "https://www.google.com/maps/d/u/0/embed?mid=1wrqeO7Do01Qi-opFeeALKHALMdYyRN8&noprof=1&hl=en",
    "gewan-c2": "https://www.google.com/maps/d/u/0/embed?mid=1nPSY9CLK2ylFcBmWyf87oQrmQy7wF3A&noprof=1&hl=en"
};

// LOAD MAP FROM URL

function copyGoogleMapLink() {

    navigator.clipboard.writeText(currentMapUrl).then(() => {
        alert("Google Map link copied!");
    });
}

function loadFromURL() {

    const params = new URLSearchParams(window.location.search);
    const page = params.get("page");
    const key = params.get("map") || "assets-all";

    const mapFrame = document.getElementById("mapFrame");
    const vehicleFrame = document.getElementById("vehicleFrame");
    const contentInventoryFrame = document.getElementById("contentInventoryFrame");

    // VEHICLE MODE
    if (page === "vehicle") {
        mapFrame.style.display = "none";
        vehicleFrame.style.display = "block";

        document.getElementById("vehicleTrafficLink").classList.add("active");
        return;
    }

    // MAP MODE (default)
    vehicleFrame.style.display = "none";
    mapFrame.style.display = "block";

    if (maps[key]) {
        mapFrame.src = maps[key];
    }

    setActive(key);
}

// SET MAP
function setMap(key) {

    currentMapKey = key;
    currentMapUrl = maps[key]; // 👈 store actual Google map URL

    const frame = document.getElementById("mapFrame");
    frame.style.display = "block";
    document.getElementById("vehicleFrame").style.display = "none";

    frame.src = currentMapUrl;

    const url = new URL(window.location);
    url.searchParams.set("map", key);
    url.searchParams.delete("page");
    window.history.pushState({}, "", url);

    setActive(key);
}

function copyMapLink() {

    const url = new URL(window.location);

    url.searchParams.set("map", currentMapKey);
    url.searchParams.delete("page");

    navigator.clipboard.writeText(url.toString()).then(() => {
        alert("Map link copied!");
    });
}

// ACTIVE STATE HANDLER
function setActive(key) {

    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));

    const matchMap = document.querySelector(`[data-map="${key}"]`);
    if (matchMap) {
        matchMap.classList.add("active");
        const parent = matchMap.closest(".dropdown-parent")?.querySelector(".nav-link");
        if (parent) parent.classList.add("active");
    }

    // Vehicle Traffic Report active detection removed (handled by URL)
}

function openContentInventory() {

    // hide map
    document.getElementById("mapFrame").style.display = "none";

    // show content inventory
    document.getElementById("contentInventoryFrame").style.display = "block";

    // active state
    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
    document.getElementById("contentInventoryLink").classList.add("active");

    // IMPORTANT: remove map param
    const url = new URL(window.location);
    url.searchParams.delete("map");
    url.searchParams.set("page", "content-inventory");
    window.history.pushState({}, "", url);
}

function openVehicleReport() {

    // hide map
    document.getElementById("mapFrame").style.display = "none";

    // show vehicle
    document.getElementById("vehicleFrame").style.display = "block";

    // active state
    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
    document.getElementById("vehicleTrafficLink").classList.add("active");

    // IMPORTANT: remove map param
    const url = new URL(window.location);
    url.searchParams.delete("map");
    url.searchParams.set("page", "vehicle");
    window.history.pushState({}, "", url);
}

// URL-BASED ACTIVE STATE (for external page)
function setActiveByURL() {
    const url = window.location.href;

    const vehicleLink = document.getElementById("vehicleTrafficLink");

    if (url.includes("vehicle-traffic-report.html")) {
        vehicleLink.classList.add("active");
    }

    const contentInventoryLink = document.getElementById("contentInventoryLink");

    if (url.includes("index.html")) {
        contentInventoryLink.classList.add("active");
    } else {
        contentInventoryLink.classList.remove("active");
    }
}

// INIT
loadFromURL();
setActiveByURL();

</script>
</body>
</html>
