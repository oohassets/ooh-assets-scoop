<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOOP OOH Assets</title>

    <script>(function(){const t=localStorage.getItem("scoop-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="./assets/js/pwa.js"></script>
    <script type="module" src="./assets/js/app.js"></script>

    <!-- Chatbase AI widget -->
    <script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...args)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(args)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="0rwe9Qe63NSTaz30U9HXA";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>

    <!-- Icons -->
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/navigation.css">
    <link rel="stylesheet" href="assets/css/layout.css">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="images/scooplogo_black_192x192.png">
    <link rel="icon" type="image/x-icon" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_32x32.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_180x180.png">
    <meta name="theme-color" content="#050A1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SCOOP OOH">
    <meta name="application-name" content="SCOOP OOH">
    <meta name="msapplication-TileImage" content="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_512x512.png">
    <meta name="msapplication-TileColor" content="#050A1A">

  </head>

  <body style="display:none">
    <!-- ══════════════════════════════════════════
        TOP NAV
    ══════════════════════════════════════════ -->
    <nav>
      <div class="nav-logo">
        <div class="nav-logo-mark">
          <img id="loginLogo" src="images/scooplogo.png" alt="Scoop Logo">
        </div>
      </div>

      <div class="nav-center">

        <div class="nav-item">
          <button class="nav-link" id="homeLink" onclick="openHome()">Dashboard</button>
        </div>

        <div class="nav-item">
          <button class="nav-link" id="bookingsLink" onclick="openBookings()">Bookings</button>
        </div>

        <div class="nav-item">
          <button class="nav-link" id="contentInventoryLink" onclick="openContentInventory()">Content Inventory</button>
        </div>

        <div class="nav-item dropdown-parent">
          <button class="nav-link">
            Assets Location <span class="chevron">▾</span>
          </button>
          <div class="mega-dropdown">

            <!-- Digital/Static/Assets columns are rendered from RTDB `assetmap` — see asset-location-menu.js -->
            <div id="assetsMegaColumns" style="display:contents"></div>

          </div>
        </div>

        <div class="nav-item">
          <button class="nav-link" id="vehicleTrafficLink" onclick="openVehicleReport()">Visitors</button>
        </div>

        <div class="nav-item dropdown-parent">
          <button class="nav-link">Services <span class="chevron">▾</span></button>
          <div class="mega-dropdown" style="min-width:240px;">
            <div class="mega-column">
              <div class="mega-title">Services</div>
              <div class="hover-item"><div class="hover-title"><a onclick="openAssetDimensionChecker()">Asset Dimension Checker</a></div></div>
              <div class="hover-item"><div class="hover-title"><a onclick="openImageCompressor()">Bulk Image Compressor</a></div></div>
            </div>
          </div>
        </div>

        <div class="nav-item">
          <button class="nav-link" id="viewScreenLink" onclick="openViewScreen()">View Screen</button>
        </div>

      </div>

      <div class="nav-actions">
        <!-- Chatbase — desktop only -->
        <button class="btn-theme btn-scoop-agent" id="chatbaseNavBtn" title="Scoop Agent"
          onclick="window.chatbase && window.chatbase('open')">
          <span class="material-symbols-outlined" style="font-size:20px;">quickreply</span>
        </button>

        <!-- Notification bell -->
        <div class="notif-bell" id="notifBell">
          <button class="btn-theme notif-btn" id="notifBtn" title="Notifications">
            <span class="material-symbols-outlined" style="font-size:20px;">notifications</span>
            <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
          </button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-panel-hdr">
              <span class="notif-panel-title">Notifications</span>
              <div class="notif-hdr-btns">
                <button class="notif-mark-read" id="notifMarkRead">Mark all read</button>
                <button class="notif-clear-btn" id="notifClearAll" title="Clear all">
                  <span class="material-symbols-outlined">delete_sweep</span>
                </button>
              </div>
            </div>
            <div class="notif-list" id="notifList">
              <div class="notif-empty">
                <span class="material-symbols-outlined">notifications_none</span>
                <p>Loading…</p>
              </div>
            </div>
          </div>
        </div>

        <!-- User profile avatar + dropdown -->
        <div class="user-avatar-wrap" id="userAvatarWrap">
          <button class="user-avatar" id="userAvatarBtn" title="My Account">
            <span id="navAvatarInitials">U</span>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-profile">
              <div class="user-dropdown-avatar-lg">
                <span id="userDropdownInitials">U</span>
              </div>
              <div class="user-dropdown-info">
                <div class="user-dropdown-name" id="userDropdownName">User</div>
                <div class="user-dropdown-position" id="userDropdownPosition"></div>
                <div class="user-dropdown-email" id="userDropdownEmail"></div>
              </div>
            </div>
            <div class="user-dropdown-divider"></div>
            <button class="user-dropdown-item" id="userThemeToggle">
              <span class="material-symbols-outlined" id="userThemeIcon">dark_mode</span>
              <span id="userThemeLabel">Dark Mode</span>
            </button>
            <button class="user-dropdown-item user-dropdown-item--signout" id="userSignOutBtn">
              <span class="material-symbols-outlined">logout</span>
              Sign Out
            </button>
          </div>
        </div>
      </div>

      <!-- Shown instead of the icon cluster on every page except Dashboard/Splash -->
      <div class="nav-page-title" id="navPageTitle" hidden>
        <div class="nav-page-title-text" id="navPageTitleText"></div>
        <p class="nav-page-title-sub" id="navPageTitleSub"></p>
      </div>

    </nav>

    <!-- ══════════════════════════════════════════
        MAP AREA
    ══════════════════════════════════════════ -->
    <div class="map-container">

      <div class="map-overlay">
        <button class="info-btn" onclick="toggleInfoCard()" title="View Asset Details">
          <img src="https://img.icons8.com/softteal-line/ffffff/info.png" alt="Info">
        </button>
        <button class="share-btn" onclick="copyGoogleMapLink()" title="Copy Map Link">
          <img src="https://img.icons8.com/?size=100&id=98959&format=png&color=ffffff" alt="Share">
        </button>
      </div>

      <div id="infoCard" class="info-card">
        <div class="info-header" id="infoHeader">
          Asset Rate Card
          <span class="close-info" onclick="toggleInfoCard()">✕</span>
        </div>
        <table class="info-table">
          <tbody id="infoTableBody"></tbody>
        </table>
      </div>

      <!-- FRAME SOURCE-->
      <iframe id="mapFrame" style="display:none;"></iframe>

      <!-- Global decorative orbs — persistent app background -->
      <div id="page-orbs">
        <div class="page-orb page-orb1"></div>
        <div class="page-orb page-orb2"></div>
        <div class="page-orb page-orb3"></div>
      </div>

      <div id="app-content" class="app-frame" style="display:none;"></div>

    </div>

    <!-- ══════════════════════════════════════════
        MOBILE DOCK
    ══════════════════════════════════════════ -->
    <div class="mobile-dock" id="mobileDock">

      <button class="dock-item active" id="btnHome" title="Dashboard">
        <span class="material-symbols-outlined">home</span>
      </button>

      <button class="dock-item" id="btnBookings" title="Bookings">
        <span class="material-symbols-outlined">event_note</span>
      </button>

      <button class="dock-item" id="btnContentInventory" title="Contents">
        <span class="material-symbols-outlined">format_align_left</span>
      </button>

      <button class="dock-item" id="btnAssetsLocation" title="Assets">
        <span class="material-symbols-outlined">pin_drop</span>
      </button>

      <button class="dock-item" id="btnServices" title="Services">
        <span class="material-symbols-outlined">apps</span>
      </button>

    </div>

    <!-- Assets Panel -->
    <div class="dock-panel" id="assetsPanel">
      <div class="panel-header">
        <button class="asset-header" onclick="setMapAndClose('assets')">Asset Location</button>
      </div>

      <!-- Digital/Static sections are rendered from RTDB `assetmap` — see asset-location-menu.js -->
      <div id="assetsPanelGenerated"></div>
    </div>

    <!-- Services Panel -->
    <div class="dock-panel" id="servicesPanel">
      <div class="panel-header">Services</div>
      <div class="panel-content">
        <button onclick="openVehicleReport()">Visitors</button>
        <button onclick="openAssetDimensionChecker()">Asset Dimension Checker</button>
        <button onclick="openImageCompressor()">Bulk Image Compressor</button>
        <button onclick="openViewScreen()">View Screen</button>
      </div>
    </div>
    
  </body>
</html>
