<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOOP OOH Assets</title>

<script type="module">
  import { requireAuth } from "./assets/js/authGuard.js";
  import { auth } from "./firebase/firebase.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

  requireAuth((user) => {
    const userNameEl = document.getElementById("userName");

    userNameEl.textContent =
      user.displayName || user.email.split("@")[0];

    // LOGOUT BUTTON
    document.getElementById("logoutBtn").addEventListener("click", () => {
        signOut(auth)
          .then(() => {
              window.location.href = "./login.html";
          })
          .catch((error) => {
              console.error("Logout error:", error);
              alert("Failed to logout");
          });
    });
  });
</script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}


/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    height: 65px;
    background: #fff;
    border-bottom: 1px solid #ddd;
}

.logo { height: 50px; }

.nav-center {
    display: flex;
    gap: 35px;
}

.nav-item { position: relative; }

.nav-link {
    text-decoration: none;
    color: #333;
    font-size: 14px;
    position: relative;
    padding: 8px 0;
    cursor: pointer;
}

/* SLIDING BAR */
.nav-link::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    height: 3px;
    width: 100%;
    background: orange;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
}

.nav-link.active::after {
    transform: scaleX(1);
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 120%;
    left: 0;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    border-radius: 10px;
    min-width: 280px;
    padding: 8px;
    display: none;
    flex-direction: column;
}

.dropdown a {
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 6px;
    text-decoration: none;
    color: #333;
    font-size: 13px;
}

.dropdown a:hover { background: #f3f3f3; }

.map-container {
    position: relative;
}

.map-container {
    position: relative;
}

/* overlay container */
.map-overlay {
  position:absolute; 
  background:#4d6a79; 
  opacity:1; 
}

.hide-top-right {
  top:0;
  right:0;
  width:140px;
  height:50px;
  pointer-events:auto; 
}

/* button style matching iframe feel */
.share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
     position:absolute;
  top:10px;
  right:20px;
  background:transparent;
  padding:.25rem .5rem;
border: none;
}

.share-btn img {
    width:25px;
    height: 25px;
    display: block;
    margin: auto;
}

.share-btn:hover {
    transform: scale(1.05);
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

#logoutBtn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#logoutBtn img {
    width: 20px;
    height: 20px;
    transition: transform 0.2s ease;
}

#logoutBtn:hover img {
    transform: scale(1.1);
}

@media (min-width: 769px) {
    .dropdown-parent:hover .dropdown { display: flex; }
}

.nav-right { font-size: 14px; }

.hamburger {
    display: none;
    font-size: 24px;
    cursor: pointer;
}

/* MAP */
.map-container {
    height: calc(100vh - 65px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media (max-width: 768px) {

    .hamburger { display: block; }

    .nav-center {
        position: absolute;
        top: 65px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        display: none;
    }

    .nav-center.active { display: flex; }

    .nav-link { padding: 10px; display: block; }

    .dropdown {
        position: static;
        display: none;
        border: none;
    }

    .dropdown-parent.open .dropdown { display: flex; }
}
</style>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/scooplogo_black_192x192.png">
<link rel="icon" type="image/x-icon" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_32x32.ico">
<link rel="icon" type="image/png" sizes="192x192" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_512x512.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_180x180.png">
  
<meta name="theme-color" content="#ffffff">
<meta name="background-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SCOOP OOH">
<meta name="application-name" content="SCOOP OOH">
<meta name="msapplication-TileImage" content="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo_black_512x512.png">
<meta name="msapplication-TileColor" content="#ffffff">

</head>

<body>

<nav class="navbar">
    <img src="https://oohassets.github.io/ooh-assets-scoop/images/scooplogo.png" class="logo">

    <div class="hamburger" id="hamburger">☰</div>

    <div class="nav-center" id="navMenu">

        <!-- ✅ FIXED: Content Inventory -->
        <div class="nav-item">
            <a class="nav-link"
               id="contentInventoryLink"
               onclick="openContentInventory()">
                Content Inventory
            </a>
        </div>

        <div class="nav-item dropdown-parent">
            <a class="nav-link" data-map="assets-all" onclick="setMap('assets-all')">Assets Map</a>
            <div class="dropdown">
                <a data-map="mupi-all" onclick="setMap('mupi-all')">TPI - Mupi All Circuit</a>
                <a data-map="mupi-c1" onclick="setMap('mupi-c1')">TPI Mupi Circuit 1</a>
                <a data-map="mupi-c2" onclick="setMap('mupi-c2')">TPI Mupi Circuit 2</a>

                <a data-map="gewan-all" onclick="setMap('gewan-all')">Gewan Crystal Walk All Circuit</a>
                <a data-map="gewan-c1" onclick="setMap('gewan-c1')">Gewan Circuit 1</a>
                <a data-map="gewan-c2" onclick="setMap('gewan-c2')">Gewan Circuit 2</a>
            </div>
        </div>

        <!-- ✅ FIXED: Vehicle Traffic Report -->
        <div class="nav-item">
        <a class="nav-link"
        id="vehicleTrafficLink"
        onclick="openVehicleReport()">
        Vehicle Traffic Report
        </a>
        </div>
        


    </div>

    <div class="nav-right">
        👤 <span id="userName">Loading...</span>
        <button id="logoutBtn" title="Logout">
            <img src="https://img.icons8.com/?size=100&id=2445&format=png&color=000000" alt="Logout">
        </button>
    </div>
</nav>

<div class="map-container">

<div class="map-overlay hide-top-right">
    <button class="share-btn" onclick="copyGoogleMapLink()" title="Copy Map Link">
        <img 
            src="https://img.icons8.com/?size=100&id=98959&format=png&color=ffffff" 
            alt="Share"
        >
    </button>
</div>

    <!-- MAP IFRAME -->
    <iframe id="mapFrame" style="display:none;"></iframe>

    <!-- VEHICLE TRAFFIC REPORT IFRAME -->
    <iframe id="vehicleFrame" style="display:none;"
        src="https://oohassets.github.io/ooh-assets-scoop/vehicle-traffic-report.html">
    </iframe>
    <!-- CONTENT INVENTORY IFRAME -->
    <iframe id="contentInventoryFrame" style="display:none;"
        src="https://oohassets.github.io/ooh-assets-scoop/content-inventory.html">
    </iframe>                   
</div>

<script>

// MAP LIST
const maps = {
    "assets-all": "https://www.google.com/maps/d/u/0/embed?mid=1O9QdapVXTxIAc27SDk8ELyLVISIOVB4&noprof=1&hl=en",
    "mupi-all": "https://www.google.com/maps/d/u/0/embed?mid=1vOMNPiS5Y-HrRRHCR1KcJhUcXn9xwEw&noprof=1&hl=en",
    "mupi-c1": "https://www.google.com/maps/d/u/0/embed?mid=1BrVkhO1Lg0HRAKHpGeH74zEDztPX-pE&noprof=1&hl=en",
    "mupi-c2": "https://www.google.com/maps/d/u/0/embed?mid=1MajcJPKIVulbFbP5yotE1NxGdhElf_k&noprof=1&hl=en",
    "gewan-all": "https://www.google.com/maps/d/u/0/embed?mid=1SFDoLXZLLc2-B3se_7_qjfZcf2ZYNDs&noprof=1&hl=en",
    "gewan-c1": "https://www.google.com/maps/d/u/0/embed?mid=1wrqeO7Do01Qi-opFeeALKHALMdYyRN8&noprof=1&hl=en",
    "gewan-c2": "https://www.google.com/maps/d/u/0/embed?mid=1nPSY9CLK2ylFcBmWyf87oQrmQy7wF3A&noprof=1&hl=en"
};

let currentMapKey = "assets-all";
let currentMapUrl = maps["assets-all"]; // ✅ FIXED POSITION

// COPY GOOGLE MAP LINK
function copyGoogleMapLink() {
    navigator.clipboard.writeText(currentMapUrl).then(() => {
        alert("Google Map link copied!");
    });
}


// LOAD FROM URL
function loadFromURL() {

    const params = new URLSearchParams(window.location.search);
    const page = params.get("page");
    const key = params.get("map");

    const mapFrame = document.getElementById("mapFrame");
    const vehicleFrame = document.getElementById("vehicleFrame");
    const contentInventoryFrame = document.getElementById("contentInventoryFrame");

    // 👉 VEHICLE PAGE
    if (page === "vehicle") {

        mapFrame.style.display = "none";
        contentInventoryFrame.style.display = "none";
        vehicleFrame.style.display = "block";

        toggleOverlay(false);

        document.getElementById("vehicleTrafficLink").classList.add("active");
        return;
    }

    // 👉 MAP PAGE ONLY IF map EXISTS
    if (key && maps[key]) {

        currentMapKey = key;
        currentMapUrl = maps[key];

        mapFrame.style.display = "block";
        vehicleFrame.style.display = "none";
        contentInventoryFrame.style.display = "none";

        mapFrame.src = maps[key];

        toggleOverlay(true);
        setActive(key);
        return;
    }

    // 👉 DEFAULT = CONTENT INVENTORY (FORCE THIS)
    mapFrame.style.display = "none";
    vehicleFrame.style.display = "none";
    contentInventoryFrame.style.display = "block";

    toggleOverlay(false);

    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
    document.getElementById("contentInventoryLink").classList.add("active");
}

function toggleOverlay(show) {
    const overlay = document.querySelector(".map-overlay");
    overlay.style.display = show ? "block" : "none";
}

// SET MAP
function setMap(key) {

    currentMapKey = key;
    currentMapUrl = maps[key];

    const frame = document.getElementById("mapFrame");
    frame.style.display = "block";
    document.getElementById("vehicleFrame").style.display = "none";
    document.getElementById("contentInventoryFrame").style.display = "none";

    frame.src = currentMapUrl;

    toggleOverlay(true); // ✅ SHOW overlay

    const url = new URL(window.location);
    url.searchParams.set("map", key);
    url.searchParams.delete("page");
    window.history.pushState({}, "", url);

    setActive(key);
}

// ACTIVE STATE
function setActive(key) {
    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));

    const match = document.querySelector(`[data-map="${key}"]`);
    if (match) {
        match.classList.add("active");
        const parent = match.closest(".dropdown-parent")?.querySelector(".nav-link");
        if (parent) parent.classList.add("active");
    }
}

// CONTENT INVENTORY
function openContentInventory() {

    document.getElementById("mapFrame").style.display = "none";
    document.getElementById("vehicleFrame").style.display = "none";
    document.getElementById("contentInventoryFrame").style.display = "block";

    toggleOverlay(false);

    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
    document.getElementById("contentInventoryLink").classList.add("active");

    const url = new URL(window.location);
    url.searchParams.delete("map");
    url.searchParams.delete("page"); // 👈 important
    window.history.pushState({}, "", url);
}

// VEHICLE REPORT
function openVehicleReport() {

    document.getElementById("mapFrame").style.display = "none";
    document.getElementById("contentInventoryFrame").style.display = "none";
    document.getElementById("vehicleFrame").style.display = "block";

    toggleOverlay(false); // ❌ HIDE overlay

    document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
    document.getElementById("vehicleTrafficLink").classList.add("active");

    const url = new URL(window.location);
    url.searchParams.delete("map");
    url.searchParams.set("page", "vehicle");
    window.history.pushState({}, "", url);
}

// ------------------
// ✅ MOBILE FIXES
// ------------------

const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("navMenu");

// TOGGLE MENU
hamburger.addEventListener("click", () => {
    navMenu.classList.toggle("active");
});

// DROPDOWN FIX
document.querySelectorAll(".dropdown-parent > .nav-link").forEach(link => {
    link.addEventListener("click", function (e) {

        if (window.innerWidth <= 768) {
            e.preventDefault();

            const parent = this.parentElement;

            document.querySelectorAll(".dropdown-parent").forEach(item => {
                if (item !== parent) item.classList.remove("open");
            });

            parent.classList.toggle("open");
        }
    });
});

// AUTO CLOSE MENU
document.querySelectorAll(".nav-link, .dropdown a").forEach(item => {
    item.addEventListener("click", () => {
        if (window.innerWidth <= 768) {
            navMenu.classList.remove("active");
        }
    });
});

// INIT
loadFromURL();

document.addEventListener("DOMContentLoaded", () => {
    loadFromURL();
});

</script>
</body>
</html>
