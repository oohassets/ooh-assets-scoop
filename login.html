<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoop OOH — Login</title>
<link rel="icon" type="image/png" href="images/scooplogo_black_192x192.png">
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  transition:background 0.4s,color 0.4s;
}

/* CANVAS */
#login-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* GRID OVERLAY */
.grid-overlay{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(79,70,229,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,70,229,0.06) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
  pointer-events:none;z-index:0;
}
[data-theme="light"] .grid-overlay{
  background-image:
    linear-gradient(rgba(79,70,229,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,70,229,0.08) 1px, transparent 1px);
}

/* ORBS */
.orb{
  position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;
  animation:orbFloat 8s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:rgba(79,70,229,0.12);top:-150px;right:-150px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:rgba(6,182,212,0.08);bottom:-100px;left:-120px;animation-delay:-3s;}
.orb3{width:280px;height:280px;background:rgba(124,58,237,0.09);top:40%;left:5%;animation-delay:-5s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(15px,-20px) scale(1.02);}
  66%{transform:translate(-10px,10px) scale(0.98);}
}
[data-theme="light"] .orb1{background:rgba(79,70,229,0.07);}
[data-theme="light"] .orb2{background:rgba(6,182,212,0.05);}
[data-theme="light"] .orb3{background:rgba(124,58,237,0.05);}

/* SCROLL PROGRESS */
#scroll-progress{
  position:fixed;top:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--accent-indigo),var(--accent-cyan));
  z-index:9999;width:100%;
  box-shadow:0 0 8px var(--accent-indigo);
}

/* THEME TOGGLE */
.btn-theme{
  position:fixed;top:20px;right:20px;z-index:100;
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border-glass);
  background:var(--bg-glass);
  color:var(--text-secondary);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;backdrop-filter:blur(12px);
}
.btn-theme:hover{border-color:var(--accent-indigo);color:var(--text-primary);}

/* CARD */
.login-card{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  margin:20px;
  background:var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius:32px;
  padding:44px 40px;
  backdrop-filter:blur(24px);
  box-shadow:0 30px 80px rgba(0,0,0,0.35), 0 0 0 1px var(--border-glass);
  animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(30px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
[data-theme="light"] .login-card{
  background:rgba(255,255,255,0.75);
  box-shadow:0 20px 60px rgba(79,70,229,0.12), 0 0 0 1px var(--border-glass);
}

/* LOGO */
.login-logo-wrap{
  display:flex;flex-direction:column;align-items:center;margin-bottom:10px;
}
.login-logo-mark{
  width:72px;height:72px;
  border-radius:18px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
.login-logo-mark img{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
}
@keyframes logoGlow{
  0%,100%{box-shadow:0 8px 30px var(--glow-indigo);}
  50%{box-shadow:0 8px 40px rgba(79,70,229,0.5);}
}
.login-brand{
  font-family:var(--font-display);font-weight:800;font-size:18px;
  color:var(--text-primary);letter-spacing:-0.01em;
}
.login-brand-sub{
  font-size:12px;color:var(--text-muted);margin-top:3px;
  font-family:var(--font-display);font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
}



/* EYEBROW */
.login-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:999px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  font-size:11px;font-weight:600;font-family:var(--font-display);
  color:var(--accent-cyan);letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:10px;
}
.login-eyebrow::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent-cyan);}

/* HEADLINE */
.login-headline{
  font-family:var(--font-display);font-size:28px;font-weight:800;
  color:var(--text-primary);letter-spacing:-0.02em;
  margin-bottom:6px;
}
.login-sub{
  font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.5;
}

/* FIELDS */
.field-group{margin-bottom:16px;position:relative;}
.field-label{
  display:block;font-size:11px;font-weight:700;font-family:var(--font-display);
  color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;
  margin-bottom:8px;
}
.field-wrap{
  position:relative;display:flex;align-items:center;
}

.field-icon {
  position: absolute;
  left: 16px;
  color: var(--text-muted);
  font-size: 16px;
  z-index: 1;
  pointer-events: none;
}


.field-input{
  width:100%;height:52px;
  padding:0 16px 0 46px;
  padding-left: 48px;
  background:var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius:16px;
  color:var(--text-primary);
  font-family:var(--font-body);font-size:14px;
  outline:none;
  transition:all 0.25s;
  -webkit-appearance:none;
  appearance:none;
  -webkit-appearance:none;
}
.field-input::placeholder{color:var(--text-muted);}
.field-input:focus{
  border-color:var(--accent-indigo);
  background:var(--bg-glass-hover);
  box-shadow:0 0 0 4px var(--glow-indigo);
}
.field-input:focus + .field-focus-bar,
.field-wrap:focus-within .field-icon{color:var(--accent-indigo);}

/* PASSWORD TOGGLE */
.pw-toggle{
  position:absolute;right:14px;
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:16px;
  padding:4px;border-radius:6px;
  transition:color 0.2s;z-index:2;
}
.pw-toggle:hover{color:var(--text-secondary);}

/* ERROR */
#loginMessage{
  font-size:13px;font-weight:500;
  color:var(--accent-cyan);
  min-height:18px;margin-bottom:4px;
  transition:all 0.2s;
  text-align:center;
}
#loginMessage.error{color:#F87171;}
#loginMessage.success{color:#34D399;}

/* BUTTON */
.btn-login{
  width:100%;height:52px;
  border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,var(--accent-indigo),var(--accent-violet));
  color:white;
  font-family:var(--font-display);font-weight:700;font-size:15px;
  letter-spacing:0.01em;
  box-shadow:0 8px 30px var(--glow-indigo);
  transition:all 0.25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;
  position:relative;overflow:hidden;
}
.btn-login::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  opacity:0;transition:opacity 0.25s;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 40px var(--glow-indigo);}
.btn-login:hover::before{opacity:1;}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-arrow{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  transition:transform 0.2s;
}
.btn-login:hover .btn-arrow{transform:translateX(3px);}

/* DIVIDER */
.login-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
}
.login-divider::before,.login-divider::after{
  content:"";flex:1;height:1px;background:var(--border-glass);
}
.login-divider span{
  font-size:11px;color:var(--text-muted);font-weight:600;
  font-family:var(--font-display);letter-spacing:0.06em;text-transform:uppercase;
}

/* FOOTER BADGE */
.login-footer{
  margin-top:28px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-footer-badge{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:999px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  font-size:11px;font-weight:600;font-family:var(--font-display);
  color:var(--text-muted);letter-spacing:0.04em;
}
.login-footer-badge .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent-indigo);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(0.8);}}

/* CURSOR */



@media(max-width:480px){
  .login-card{padding:36px 28px;border-radius:28px;}
  .login-headline{font-size:24px;}
}
</style>
</head>
<body>

<div id="scroll-progress"></div>


<canvas id="login-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<button class="btn-theme" id="themeToggle" title="Toggle theme">☀</button>


<div class="login-card">

  <div class="login-logo-wrap">
    <div class="login-logo-mark">
      <img id="loginLogo" src="images/scooplogo_white.png" alt="Scoop Logo">
    </div>
   <!-- <div class="login-brand">Monitor • Analyze • Optimize</div> -->
   <!-- <div class="login-brand-sub">Campaign Intelligence & Performance Analytics</div> -->

  </div>

  <div class="login-eyebrow">Secure Access</div>
  <h1 class="login-headline">Welcome back</h1>
  <p class="login-sub">Sign in to manage your OOH campaigns.</p>


  <div class="field-group">
    <label class="field-label" for="username">Username</label>
    <div class="field-wrap">
      <i class="fa-regular fa-user field-icon"></i>

      <input
        class="field-input"
        id="username"
        type="text"
        placeholder="Enter your username"
        autocomplete="username"
      >
    </div>
  </div>

  <div class="field-group">
    <label class="field-label" for="password">Password</label>
    <div class="field-wrap">
      <i class="fa-solid fa-key field-icon"></i>

      <input
        class="field-input"
        id="password"
        type="password"
        placeholder="Enter your password"
        autocomplete="username"
      >
      <button 
        class="pw-toggle" 
        id="pwToggle" 
        type="button" 
        aria-label="Toggle password visibility">👁</button>

    </div>
  </div>



  <p id="loginMessage"></p>

  <button class="btn-login" id="loginBtn" type="button">
    Sign In
    <span class="btn-arrow">→</span>
  </button>

  <div class="login-divider"><span>Powered by</span></div>

  <div class="login-footer">
    <div class="login-footer-badge">
      <span class="dot"></span>
      Scoop Media &amp; Communication Co.
    </div>
  </div>

</div>

<script>
// THEME
const themeBtn = document.getElementById("themeToggle");
const logoImg = document.getElementById("loginLogo");
function applyTheme(dark) {
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  themeBtn.textContent = dark ? "☀" : "☽";
  logoImg.src = dark ? "images/scooplogo_white.png" : "images/scooplogo.png";
}
themeBtn.addEventListener("click", () => {
  applyTheme(document.documentElement.getAttribute("data-theme") !== "dark");
});

// PASSWORD TOGGLE
document.getElementById("pwToggle").addEventListener("click", function() {
  const pw = document.getElementById("password");
  const isText = pw.type === "text";
  pw.type = isText ? "password" : "text";
  this.textContent = isText ? "👁" : "🙈";
});

// ENTER KEY
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});
document.getElementById("username").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("password").focus();
});

// PARTICLES
const canvas = document.getElementById("login-canvas");
const ctx = canvas.getContext("2d");
let W, H, particles = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", () => { resize(); initParticles(); });
function Particle() {
  this.x = Math.random()*W; this.y = Math.random()*H;
  this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3;
  this.r = Math.random()*1.4+0.4;
  this.alpha = Math.random()*0.45+0.1;
}
Particle.prototype.update = function() {
  this.x += this.vx; this.y += this.vy;
  if (this.x<0) this.x=W; if (this.x>W) this.x=0;
  if (this.y<0) this.y=H; if (this.y>H) this.y=0;
};
function initParticles() {
  particles = Array.from({length: Math.floor(W*H/14000)}, () => new Particle());
}
initParticles();
let mx=W/2, my=H/2;
document.addEventListener("mousemove", e => { mx=e.clientX; my=e.clientY; });
function draw() {
  const isDark = document.documentElement.getAttribute("data-theme") !== "light";
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = isDark ? `rgba(99,102,241,${p.alpha})` : `rgba(79,70,229,${p.alpha*0.5})`;
    ctx.fill();
    const dx=p.x-mx, dy=p.y-my, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist < 110) {
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mx,my);
      ctx.strokeStyle = `rgba(79,70,229,${(1-dist/110)*(isDark?0.25:0.12)})`;
      ctx.lineWidth=0.7; ctx.stroke();
    }
    p.update();
  });
  requestAnimationFrame(draw);
}
draw();


</script>

<script type="module" src="./assets/js/login.js"></script>

</body>
</html>
