<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoop OOH — Login</title>
<link rel="icon" type="image/png" href="images/scooplogo_black_192x192.png">
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div id="scroll-progress"></div>

<div class="login-bg"></div>

<button class="btn-theme" id="userThemeToggle" type="button" title="Toggle theme">
  <span class="material-symbols-outlined" id="userThemeIcon">dark_mode</span>
</button>

<div class="login-card">

  <div class="login-logo-wrap">
    <div class="login-logo-mark">
      <img id="loginLogo" src="images/scooplogo.png" alt="Scoop Logo">
    </div>
  </div>

  <h1 class="login-headline">Welcome back</h1>
  <p class="login-sub">Sign in to manage your OOH campaigns.</p>

  <div class="field-group">
    <label class="field-label" for="username">Username</label>
    <div class="field-wrap">
      <span class="material-symbols-outlined field-icon">person</span>

      <input
        class="field-input"
        id="username"
        type="text"
        placeholder="Enter your username"
        autocomplete="username"
      >
    </div>
  </div>

  <div class="field-group">
    <label class="field-label" for="password">Password</label>
    <div class="field-wrap">
      <span class="material-symbols-outlined field-icon">key</span>

      <input
        class="field-input"
        id="password"
        type="password"
        placeholder="Enter your password"
        autocomplete="username"
      >
      <button
        class="pw-toggle"
        id="pwToggle"
        type="button"
        aria-label="Toggle password visibility"><span class="material-symbols-outlined">visibility</span></button>

    </div>
  </div>

  <p id="loginMessage"></p>

  <button class="btn-login" id="loginBtn" type="button">
    Sign In
    <span class="btn-arrow">→</span>
  </button>

</div>

<script type="module" src="./assets/js/login-ui.js"></script>
<script type="module" src="./assets/js/login.js"></script>

</body>
</html>
