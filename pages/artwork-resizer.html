<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artwork Resizer</title>
<link rel="icon" href="../images/scooplogo_black_192x192.png">
<link rel="stylesheet" href="../assets/css/theme.css">
<link rel="stylesheet" href="../assets/css/artwork-resizer.css">
<script>(function(){const t=localStorage.getItem("scoop-theme");if(t)document.documentElement.setAttribute("data-theme",t);window.addEventListener("message",function(e){if(e.data&&e.data.type==="scoop-theme"){document.documentElement.setAttribute("data-theme",e.data.theme);localStorage.setItem("scoop-theme",e.data.theme);}});})();</script>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <h1>Artwork Resizer</h1>
  <p class="subtitle">Upload artwork images or videos вҖ” each is matched by pixel size and resized to its output automatically.</p>

  <div class="size-legend">
    <span class="size-legend-item"><span class="material-symbols-outlined">arrow_forward</span><b>6656 Г— 1040</b>&nbsp;вҶ’&nbsp;<b>1920 Г— 300</b></span>
    <span class="size-legend-item"><span class="material-symbols-outlined">arrow_forward</span><b>6240 Г— 420</b>&nbsp;вҶ’&nbsp;<b>1800 Г— 121</b></span>
  </div>

  <div>
    <div class="upload-btn" id="uploadBtn">
      Upload Artwork (<span id="count">0</span>)
    </div>
    <div class="download-all" id="downloadAll">
      Download All
    </div>
  </div>

  <input type="file" id="fileInput" multiple accept="image/*,video/*">
  <div class="artwork-list" id="artworkList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- ffmpeg.wasm вҖ” these two UMD wrapper libraries are small and safe to load
     eagerly (they just define the FFmpegWASM/FFmpegUtil globals); the
     actual ~25MB core is what's fetched lazily, only once a video file is
     uploaded (see getFFmpeg()), so an image-only visit never pays for it.
     Pinned versions, single-threaded @ffmpeg/core (not core-mt) since that
     one needs no COOP/COEP response headers, which this app (GitHub Pages /
     Firebase Hosting, static "as-is" deploy) does not set. -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<script>
// Source (uploaded) pixel dimensions вҶ’ output dimensions. Matched exactly
// (see findTarget()) вҖ” a file that isn't exactly one of these sizes is
// reported as unsupported rather than guessed at.
const SIZE_MAP = [
  { fromW: 6656, fromH: 1040, toW: 1920, toH: 300 },
  { fromW: 6240, fromH: 420,  toW: 1800, toH: 121 },
];

function findTarget(w, h) {
  return SIZE_MAP.find(m => m.fromW === w && m.fromH === h) || null;
}

let converted = [];   // { url, name } for every successfully resized file
let completed = 0;
let total = 0;

// в”Җв”Җ Video (ffmpeg.wasm) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let ffmpegInstance = null;   // resolved FFmpeg() instance, created once and reused
let ffmpegLoading   = null;  // in-flight load promise, so a 2nd video queued while
                              // the core is still downloading awaits the same load
let activeProgressIndex = null; // which item's progress bar the single shared
                                 // ffmpeg instance's 'progress' event is currently for
let videoQueue = Promise.resolve(); // serializes video jobs вҖ” one shared ffmpeg
                                     // instance can't run two encodes at once

const uploadBtn      = document.getElementById('uploadBtn');
const downloadAllBtn = document.getElementById('downloadAll');
const fileInput      = document.getElementById('fileInput');
const artworkList    = document.getElementById('artworkList');
const count          = document.getElementById('count');

uploadBtn.onclick = () => {
  fileInput.value = '';
  fileInput.click();
};

downloadAllBtn.onclick = async () => {
  // 10 files or less вҶ’ normal individual downloads
  if (converted.length <= 10) {
    converted.forEach(f => {
      const a = document.createElement('a');
      a.href = f.url;
      a.download = f.name;
      a.click();
    });
    return;
  }

  // More than 10 вҶ’ bundle into a ZIP
  const zip = new JSZip();
  const folder = zip.folder("resized-artwork");

  for (const file of converted) {
    const response = await fetch(file.url);
    const blob = await response.blob();
    folder.file(file.name, blob);
  }

  const zipBlob = await zip.generateAsync({ type: "blob" });
  const zipUrl = URL.createObjectURL(zipBlob);

  const a = document.createElement('a');
  a.href = zipUrl;
  a.download = "resized-artwork.zip";
  a.click();

  URL.revokeObjectURL(zipUrl);
};

fileInput.onchange = e => {
  artworkList.innerHTML = '';
  converted = [];
  completed = 0;
  total = e.target.files.length;
  count.textContent = total;
  downloadAllBtn.style.display = 'none';

  [...e.target.files].forEach((file, i) => createItem(file, i));
};

function createItem(file, i) {
  const div = document.createElement('div');
  div.className = 'artwork-item';
  div.id = `item-${i}`;
  div.innerHTML = `
    <strong>${file.name}</strong>
    <div class="progress-bar">
      <div class="progress-fill" id="p-${i}"></div>
    </div>
    <div class="artwork-actions">
      <span id="s-${i}">Reading dimensionsвҖҰ</span>
      <button type="button" class="download-btn" id="d-${i}" disabled>Download</button>
    </div>
  `;
  artworkList.appendChild(div);
  processFile(file, i);
}

function update(i, v) {
  const el = document.getElementById(`p-${i}`);
  if (el) el.style.width = v + '%';
}

function markDone() {
  completed++;
  if (completed === total && converted.length) {
    downloadAllBtn.style.display = 'inline-block';
  }
}

function markError(i, msg) {
  document.getElementById(`item-${i}`)?.classList.add('is-error');
  update(i, 100);
  document.getElementById(`s-${i}`).textContent = msg;
  markDone();
}

function markUnsupported(i, w, h) {
  markError(i, `Unsupported size ${w}Г—${h} вҖ” expected 6656Г—1040 or 6240Г—420`);
}

function processFile(file, i) {
  if (file.type.startsWith('image')) return processImage(file, i);
  if (file.type.startsWith('video')) return processVideo(file, i);
  markError(i, 'Unsupported file type вҖ” upload an image or video.');
}

function processImage(file, i) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      update(i, 40);

      const target = findTarget(w, h);
      if (!target) { markUnsupported(i, w, h); return; }

      const canvas = document.createElement('canvas');
      canvas.width = target.toW;
      canvas.height = target.toH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, target.toW, target.toH);
      update(i, 80);

      // PNG artwork keeps its transparency; anything else exports as a
      // high-quality JPEG (matches the Bulk Image Compressor's convention).
      const isPng = file.type === 'image/png';
      const mime  = isPng ? 'image/png' : 'image/jpeg';
      const ext   = isPng ? 'png' : 'jpg';

      canvas.toBlob(blob => {
        if (!blob) { markError(i, 'Failed to encode image вҖ” try again.'); return; }

        update(i, 100);
        const originalName = file.name.replace(/\.[^/.]+$/, '');
        const name = `${originalName}_${target.toW}x${target.toH}.${ext}`;
        const url = URL.createObjectURL(blob);
        converted.push({ url, name });

        document.getElementById(`s-${i}`).textContent =
          `${w}Г—${h} вҶ’ ${target.toW}Г—${target.toH} В· ${(blob.size / 1024).toFixed(0)} KB`;

        const btn = document.getElementById(`d-${i}`);
        btn.disabled = false;
        btn.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = name;
          a.click();
        };

        markDone();
      }, mime, isPng ? undefined : 0.95);
    };
    img.onerror = () => markError(i, "Couldn't read this image.");
    img.src = e.target.result;
  };
  reader.onerror = () => markError(i, "Couldn't read this file.");
  reader.readAsDataURL(file);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

/** Lazily creates (once) and returns the shared FFmpeg instance вҖ” the two
 * UMD wrapper scripts are already loaded eagerly (see <head>), so this
 * only has to fetch+init the actual ~25MB core, and only the first time a
 * video file shows up. Every video after that reuses the same instance. */
async function getFFmpeg() {
  if (ffmpegInstance) return ffmpegInstance;
  if (!ffmpegLoading) {
    ffmpegLoading = (async () => {
      try {
        const { FFmpeg } = FFmpegWASM;
        const { toBlobURL } = FFmpegUtil;
        const ff = new FFmpeg();
        ff.on('log', ({ message }) => console.log('[ffmpeg]', message));
        ff.on('progress', ({ progress }) => {
          if (activeProgressIndex !== null) update(activeProgressIndex, Math.min(99, Math.round(progress * 100)));
        });
        const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
        await ff.load({
          coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
          wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
        });
        ffmpegInstance = ff;
        return ff;
      } catch (err) {
        // Let the next call retry cleanly instead of staying stuck forever
        // on a permanently-rejected load promise.
        ffmpegLoading = null;
        throw err;
      }
    })();
  }
  return ffmpegLoading;
}

function processVideo(file, i) {
  const url = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.preload = 'metadata';
  video.onloadedmetadata = () => {
    const w = video.videoWidth, h = video.videoHeight;
    URL.revokeObjectURL(url);

    const target = findTarget(w, h);
    if (!target) { markUnsupported(i, w, h); return; }

    update(i, 10);
    document.getElementById(`s-${i}`).textContent =
      `${w}Г—${h} вҶ’ ${target.toW}Г—${target.toH} В· queuedвҖҰ`;

    // Videos share one ffmpeg instance, so they're encoded one at a time вҖ”
    // chain onto the shared queue rather than kicking off in parallel.
    videoQueue = videoQueue
      .then(() => encodeVideo(file, i, target, w, h))
      .catch(err => {
        console.error(err);
        markError(i, `Video conversion failed вҖ” ${err?.message || 'try again'}`);
      });
  };
  video.onerror = () => { URL.revokeObjectURL(url); markError(i, "Couldn't read this video."); };
  video.src = url;
}

async function encodeVideo(file, i, target, w, h) {
  document.getElementById(`s-${i}`).textContent = 'Loading video engineвҖҰ';
  const ff = await getFFmpeg();
  const { fetchFile } = FFmpegUtil;

  const inputExt  = (file.name.split('.').pop() || 'mp4').toLowerCase();
  const inputName = `in-${i}.${inputExt}`;
  const outputName = `out-${i}.mp4`;

  activeProgressIndex = i;
  document.getElementById(`s-${i}`).textContent = 'ConvertingвҖҰ';
  try {
    await ff.writeFile(inputName, await fetchFile(file));
    await ff.exec([
      '-i', inputName,
      '-vf', `scale=${target.toW}:${target.toH}`,
      '-c:v', 'libx264',
      '-crf', '18',            // higher quality (lower = better)
      '-preset', 'medium',
      '-c:a', 'aac',
      '-b:a', '192k',
      '-movflags', 'faststart',
      outputName,
    ]);
    const data = await ff.readFile(outputName);
    const blob = new Blob([data.buffer], { type: 'video/mp4' });

    update(i, 100);
    const originalName = file.name.replace(/\.[^/.]+$/, '');
    const name = `${originalName}_${target.toW}x${target.toH}.mp4`;
    const outUrl = URL.createObjectURL(blob);
    converted.push({ url: outUrl, name });

    document.getElementById(`s-${i}`).textContent =
      `${w}Г—${h} вҶ’ ${target.toW}Г—${target.toH} В· ${(blob.size / (1024 * 1024)).toFixed(1)} MB`;

    const btn = document.getElementById(`d-${i}`);
    btn.disabled = false;
    btn.onclick = () => {
      const a = document.createElement('a');
      a.href = outUrl;
      a.download = name;
      a.click();
    };

    markDone();
  } finally {
    activeProgressIndex = null;
    // Best-effort cleanup вҖ” wrapped in try/catch rather than .catch()
    // chaining, since a *synchronous* throw here (e.g. if this ffmpeg
    // build doesn't expose deleteFile under that exact name) would
    // otherwise escape this finally block and mask an already-successful
    // conversion above as a failure.
    try { await ff.deleteFile(inputName); } catch (_) {}
    try { await ff.deleteFile(outputName); } catch (_) {}
  }
}
</script>

</body>
</html>
