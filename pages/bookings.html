<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campaign Bookings</title>
</head>
<body>

<!-- PAGE FILL WRAPPER (flex column; fills app-frame) -->
<div class="bookings-page">

  <!-- STICKY PAGE HEADER (actions only — stays pinned to top on scroll) -->
  <div class="bookings-sticky-header">
    <div class="bookings-hdr-inner">
      <div class="bookings-hdr-btns">
        <button class="btn-bar-primary" id="openBookingBtn">Add Booking</button>
        <button class="btn-bar-primary" id="tabCalendar">View Calendar</button>
      </div>
    </div>
  </div>

  <!-- FILTER TOOLBAR (search / date range / status / download) — scrolls
       away normally with the page; the schedule card takes over sticking
       to the top (right below the header buttons) once this scrolls out. -->
  <div class="bookings-toolbar-row">
    <div class="toolbar">
      <div class="search-box">
        <span class="cal-icon material-symbols-outlined">search</span>
        <input type="text" id="campaignSearch" placeholder="Search campaign, client, circuit…">
      </div>

      <div class="date-filter-wrap">
        <select class="date-modern" id="dateFilterSelect"></select>
      </div>
      <div class="date-range-inputs" id="dateRangeInputs" hidden>
        <input type="date" class="date-modern" id="customDateFrom">
        <span class="date-range-arrow material-symbols-outlined">arrow_forward</span>
        <input type="date" class="date-modern" id="customDateTo">
        <button class="date-apply-btn" id="applyCustomDate">Apply</button>
      </div>

      <div class="filter-box">
        <select id="campaignStatusFilter">
          <option value="">All Status</option>
          <option value="Live">Live</option>
          <option value="BO Signed">BO Signed</option>
          <option value="Pending">Pending</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>

      <div class="download-wrap">
        <button class="download-btn" id="downloadBtn" title="Download report">
          <span class="material-symbols-outlined">download</span>
        </button>
        <div class="download-dropdown" id="downloadDropdown">
          <button class="dl-opt" id="downloadPDF">
            <span class="material-symbols-outlined">picture_as_pdf</span>PDF
          </button>
          <button class="dl-opt" id="downloadExcel">
            <span class="material-symbols-outlined">table_view</span>Excel
          </button>
        </div>
      </div>
    </div>
  </div>


  <!-- SCHEDULE SECTION (default) -->
  <div id="scheduleSection">

    <div class="bookings-content reveal">

      <div class="card">
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Client / Brand</th>
                <th>Circuit</th>
                <th>Dates</th>
                <th>Status</th>
                <th>Person</th>
              </tr>
            </thead>
            <tbody id="campaignTableBody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px;">Loading campaigns…</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- CALENDAR SECTION -->
  <div id="calendarSection" style="display:none;">
    <div class="calendar-content reveal">
      <div class="card">
        <div class="cal-section-hdr">
          <div class="cal-search-wrap">
            <div class="search-box">
              <span class="material-symbols-outlined cal-icon">search</span>
              <input type="text" id="calSearch" placeholder="Search campaign, client, circuit…">
            </div>
          </div>

          <div class="bookings-cal-bar">
            <div class="date-filter-wrap">
              <select class="date-modern" id="calDateFilterSelect"></select>
            </div>
            <div class="date-range-inputs" id="calDateRangeInputs" hidden>
              <input type="date" class="date-modern" id="calFrom">
              <span class="date-range-arrow material-symbols-outlined">arrow_forward</span>
              <input type="date" class="date-modern" id="calTo">
              <button class="date-apply-btn" id="applyCalCustomDate">Apply</button>
            </div>

            <div class="download-wrap">
              <button class="download-btn" id="calDownloadBtn" title="Download calendar report">
                <span class="material-symbols-outlined">download</span>
              </button>
              <div class="download-dropdown" id="calDownloadDropdown">
                <button class="dl-opt" id="calDownloadPDF">
                  <span class="material-symbols-outlined">picture_as_pdf</span>PDF
                </button>
                <button class="dl-opt" id="calDownloadExcel">
                  <span class="material-symbols-outlined">table_view</span>Excel
                </button>
              </div>
            </div>

            <button class="cal-close-btn" id="tabSchedule">
              <span class="material-symbols-outlined">close</span>
            </button>

          </div>

        </div>

        <div class="bookings-cal-wrap">
          <div class="cal-scroll">
            <table id="bookingCalendar" class="booking-calendar"></table>
          </div>          
        </div>
      </div>
    </div>
  </div>

</div><!-- /.bookings-page -->

<!-- ADD / EDIT BOOKING MODAL -->
<div class="modal-overlay bk-overlay" id="bookingModal">
  <div class="bk-modal" id="bkModalBox">
  <div class="bk-main-row" id="bkMainRow">

    <!-- ── Form view ── -->
    <div class="bk-view" id="bkFormView">
      <div class="bk-hdr">
        <span class="bk-hdr-title">Booking</span>
        <button class="bk-x" id="closeBookingModal"><span class="material-symbols-outlined">close</span></button>
      </div>

      <div class="bk-body">
        <h2 class="bk-heading" id="bookingModalTitle">Let's start your booking</h2>
        <input type="hidden" id="bookingEditKey">

        <div class="bk-field">
          <input class="bk-inp" id="bookingOrder" type="text" placeholder=" ">
          <label class="bk-lbl" for="bookingOrder">BO NO</label>
        </div>

        <div class="bk-field bk-ac">
          <input class="bk-inp" id="bookingClient" type="text" placeholder=" " autocomplete="off">
          <label class="bk-lbl" for="bookingClient">Client</label>
          <div class="bk-ac-drop" id="clientSuggestions"></div>
        </div>

        <div class="bk-field bk-ac">
          <input class="bk-inp" id="bookingBrand" type="text" placeholder=" " autocomplete="off">
          <label class="bk-lbl" for="bookingBrand">Brand Campaign</label>
          <div class="bk-ac-drop" id="brandSuggestions"></div>
        </div>

        <!-- Date card — 2 columns in 1 box: (Start Date → End Date) | (N Days) -->
        <div class="bk-date-card">
          <div class="bk-date-row">
            <div class="bk-date-group">
              <div class="bk-date-pick" id="bkPickStart" role="button" tabindex="0">
                <span class="bk-dt-val bk-dt-placeholder" id="bkStartVal">Start Date</span>
              </div>
              <span class="bk-date-arrow">→</span>
              <div class="bk-date-pick" id="bkPickEnd" role="button" tabindex="0">
                <span class="bk-dt-val bk-dt-placeholder" id="bkEndVal">End Date</span>
              </div>
            </div>
            <span class="bk-date-divider"></span>
            <span class="bk-date-days" id="bookingTotalDaysDisplay">—</span>
          </div>
        </div>

        <input type="hidden" id="bookingStartDate">
        <input type="hidden" id="bookingEndDate">
        <input type="hidden" id="bookingTotalDays">

        <!-- Circuit rows are rendered/managed by bookings.js (renderCircuitRow(),
             refreshCircuitButtons()) — always at least one row, each with its
             own autocomplete; the last row shows "+", every row above it "−".
             Each row's slot availability is checked once a circuit + the
             dates above are set, and shown under that row (.bk-circuit-slot). -->
        <div id="bkCircuitList"></div>

        <!-- Off by default; lazy-inits the MapLibre map on first switch-on
             (see circuit-map.js). Toggling off just hides the panel and
             restores the form width — the map instance itself is kept. -->
        <div class="bk-map-toggle-row">
          <label class="bk-map-toggle" for="bkMapToggle">
            <input type="checkbox" id="bkMapToggle">
            <span class="bk-map-toggle-track"><span class="bk-map-toggle-thumb"></span></span>
            <span class="bk-map-toggle-label">View Circuit Map</span>
          </label>
        </div>

        <div class="bk-field bk-sel-wrap">
          <select class="bk-inp bk-sel" id="campaignStatus" required>
            <option value="" disabled selected></option>
            <option value="BO Signed">BO Signed</option>
            <option value="Pending">Pending</option>
            <option value="Live">Live</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <label class="bk-lbl">Status</label>
        </div>

        <div class="bk-booked-bar">
          <span>Booked by</span>
          <strong id="bookingPersonLabel">—</strong>
        </div>
      </div><!-- /.bk-body -->

      <div class="bk-footer">
        <button class="bk-btn-clear" id="clearFormBtn">Reset</button>
        <button class="bk-btn-save" id="confirmBookingBtn">Save Booking</button>
      </div>
    </div><!-- /.bk-view -->

    <!-- ── Circuit Map panel (hidden until the toggle above is switched on) ── -->
    <div class="bk-map-panel" id="bkMapPanel" hidden>
      <div class="bk-map-panel-hdr">
        <span class="bk-map-panel-title">Circuit Map</span>
        <div class="bk-map-hdr-actions">
          <button type="button" class="bk-map-chip active" id="bkMapLabelsToggle" aria-pressed="true" title="Toggle map labels">Labels</button>
          <button type="button" class="bk-map-chip" id="bkMapTrafficToggle" aria-pressed="false" title="Toggle live traffic">Traffic</button>
          <button type="button" class="bk-map-dim-btn" id="bkMapDimToggle" title="Toggle 2D / 3D">3D</button>
        </div>
      </div>
      <div class="bk-map-canvas-wrap">
        <div id="bkMapCanvas" class="bk-map-canvas"></div>
        <span class="bk-map-corner bk-map-corner-tl"></span>
        <span class="bk-map-corner bk-map-corner-tr"></span>
        <span class="bk-map-corner bk-map-corner-bl"></span>
        <span class="bk-map-corner bk-map-corner-br"></span>
        <div class="bk-map-notices" id="bkMapNotices"></div>
      </div>
    </div>

  </div><!-- /.bk-main-row -->

    <!-- ── Date picker (slides up over form) ── -->
    <div class="bk-picker" id="bkPicker">
      <div class="bk-picker-drag"></div>
      <div class="bk-picker-top">
        <span class="bk-picker-title">Booking dates</span>
        <button class="bk-picker-x" id="bkPickerClose"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="bk-picker-hint" id="bkPickerInfo">Select the campaign start date</div>
      <div class="bk-picker-months" id="bkPickerMonths"></div>
      <div class="bk-picker-foot">
        <div class="bk-qpicks">
          <button class="bk-qpick" data-weeks="2" disabled>2 Weeks</button>
          <button class="bk-qpick" data-weeks="4" disabled>4 Weeks</button>
        </div>
        <div class="bk-picker-summary">
          <span class="bk-picker-range" id="bkPickerRange">—</span>
          <button class="bk-picker-reset" id="bkPickerReset">Reset</button>
        </div>
        <button class="bk-picker-ok" id="bkPickerOk">Confirm</button>
      </div>
    </div>

  </div><!-- /.bk-modal -->
</div>

</body>
</html>
