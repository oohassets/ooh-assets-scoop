<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campaign Bookings</title>
</head>
<body>

<!-- TABS -->
<div class="circuit-tabs bookings-tabs">
  <button class="circuit-tab active" id="tabSchedule">Booking Schedule</button>
  <button class="circuit-tab" id="tabCalendar">View Calendar</button>
</div>

<!-- SCHEDULE SECTION (default) -->
<div id="scheduleSection">
  <div class="bookings-content">

    <div class="bookings-header">
      <div class="section-title" style="font-size:22px;">Campaign Bookings</div>
    </div>
    <p class="section-sub">Manage and udpate your bookings</p>

    <div class="bookings-action-row">
        <button class="btn-bar-primary" id="openBookingBtn">
          Add Booking
        </button>
    </div>

    <div class="card">



      <div class="toolbar">
        <div class="search-box">
          <span style="color:var(--text-muted);font-size:14px;">🔍</span>
          <input type="text" id="campaignSearch" placeholder="Search campaign, client, circuit…">
        </div>

        <div class="date-filter-wrap">
          <button class="date-filter-btn" id="dateFilterBtn">
            <span class="cal-icon">📅</span>
            <span id="dateFilterLabel">This Month</span>
            <span class="chevron-icon">▾</span>
          </button>
          <div class="date-filter-dropdown" id="dateFilterDropdown">
            <button class="date-preset selected" data-preset="this-month">This Month</button>
            <button class="date-preset" data-preset="last-month">Last Month</button>
            <button class="date-preset" data-preset="next-month">Next Month</button>
            <button class="date-preset" data-preset="all-year">All Year</button>
            <button class="date-preset" data-preset="custom">Custom Range…</button>
            <div class="date-custom-inputs" id="dateCustomInputs">
              <div><div class="date-custom-label">From</div><input type="date" class="date-custom-field" id="customDateFrom"></div>
              <div><div class="date-custom-label">To</div><input type="date" class="date-custom-field" id="customDateTo"></div>
              <button class="date-apply-btn" id="applyCustomDate">Apply</button>
            </div>
          </div>
        </div>

        <div class="filter-box">
          <select id="campaignStatusFilter">
            <option value="">All Status</option>
            <option value="Live">Live</option>
            <option value="BO Signed">BO Signed</option>
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Client / Brand</th>
              <th>Circuit</th>
              <th>Dates</th>
              <th>Status</th>
              <th>Person</th>
            </tr>
          </thead>
          <tbody id="campaignTableBody">
            <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px;">Loading campaigns…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- CALENDAR SECTION -->
<div id="calendarSection" style="display:none;">
  <div class="bookings-cal-bar">
    <div class="date-filter-wrap">
      <button class="date-filter-btn" id="calDateFilterBtn">
        <span class="cal-icon">📅</span>
        <span id="calDateFilterLabel">This Month</span>
        <span class="chevron-icon">▾</span>
      </button>
      <div class="date-filter-dropdown" id="calDateFilterDropdown">
        <button class="date-preset selected" data-cal-preset="this-month">This Month</button>
        <button class="date-preset" data-cal-preset="last-month">Last Month</button>
        <button class="date-preset" data-cal-preset="next-month">Next Month</button>
        <button class="date-preset" data-cal-preset="all-year">All Year</button>
        <button class="date-preset" data-cal-preset="custom">Custom Range…</button>
        <div class="date-custom-inputs" id="calDateCustomInputs">
          <div><div class="date-custom-label">From</div><input type="date" class="date-custom-field" id="calFrom"></div>
          <div><div class="date-custom-label">To</div><input type="date" class="date-custom-field" id="calTo"></div>
          <button class="date-apply-btn" id="applyCalCustomDate">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <div class="bookings-cal-wrap">
    <div class="cal-scroll">
      <table id="bookingCalendar" class="booking-calendar"></table>
    </div>
  </div>
</div>

<!-- ADD / EDIT BOOKING MODAL -->
<div class="modal-overlay bk-overlay" id="bookingModal">
  <div class="bk-modal">

    <!-- ── Form view ── -->
    <div class="bk-view" id="bkFormView">
      <div class="bk-hdr">
        <span class="bk-hdr-title">Booking</span>
        <button class="bk-x" id="closeBookingModal"><span class="material-symbols-outlined">close</span></button>
      </div>

      <div class="bk-body">
        <h2 class="bk-heading" id="bookingModalTitle">Let's start your booking</h2>
        <input type="hidden" id="bookingEditKey">

        <div class="bk-field">
          <input class="bk-inp" id="bookingOrder" type="text" placeholder=" ">
          <label class="bk-lbl" for="bookingOrder">BO NO</label>
        </div>

        <div class="bk-field bk-ac">
          <input class="bk-inp" id="bookingClient" type="text" placeholder=" " autocomplete="off">
          <label class="bk-lbl" for="bookingClient">Client</label>
          <div class="bk-ac-drop" id="clientSuggestions"></div>
        </div>

        <div class="bk-field bk-ac">
          <input class="bk-inp" id="bookingBrand" type="text" placeholder=" " autocomplete="off">
          <label class="bk-lbl" for="bookingBrand">Brand Campaign</label>
          <div class="bk-ac-drop" id="brandSuggestions"></div>
        </div>

        <div class="bk-field bk-ac">
          <input class="bk-inp" id="bookingAssetText" type="text" placeholder=" " autocomplete="off">
          <input type="hidden" id="bookingAsset">
          <label class="bk-lbl" for="bookingAssetText">Asset / Circuit</label>
          <div class="bk-ac-drop" id="assetSuggestions"></div>
        </div>

        <!-- Date card -->
        <div class="bk-date-card">
          <div class="bk-date-cols">
            <div class="bk-date-col" id="bkPickStart" role="button" tabindex="0">
              <span class="bk-dt-lbl">Start Date</span>
              <span class="bk-dt-val" id="bkStartVal">—</span>
            </div>
            <div class="bk-date-sep"></div>
            <div class="bk-date-col" id="bkPickEnd" role="button" tabindex="0">
              <span class="bk-dt-lbl">End Date</span>
              <span class="bk-dt-val" id="bkEndVal">—</span>
            </div>
          </div>
          <div class="bk-date-meta">
            <span id="bookingTotalDaysDisplay">—</span>
            <span id="bookingSlotDisplay">—</span>
          </div>
        </div>

        <input type="hidden" id="bookingStartDate">
        <input type="hidden" id="bookingEndDate">
        <input type="hidden" id="bookingTotalDays">
        <input type="hidden" id="bookingSlot">

        <div class="bk-field bk-sel-wrap">
          <select class="bk-inp bk-sel" id="campaignStatus">
            <option value="" disabled></option>
            <option value="BO Signed">BO Signed</option>
            <option value="Pending">Pending</option>
            <option value="Live">Live</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <label class="bk-lbl bk-lbl-fixed">Status</label>
        </div>

        <div class="bk-booked-bar">
          <span>Booked by</span>
          <strong id="bookingPersonLabel">—</strong>
        </div>
      </div><!-- /.bk-body -->

      <div class="bk-footer">
        <button class="bk-btn-clear" id="clearFormBtn">Clear</button>
        <button class="bk-btn-save" id="confirmBookingBtn">Save Booking</button>
      </div>
    </div><!-- /.bk-view -->

    <!-- ── Date picker (slides up over form) ── -->
    <div class="bk-picker" id="bkPicker">
      <div class="bk-picker-drag"></div>
      <div class="bk-picker-top">
        <div class="bk-picker-info" id="bkPickerInfo">Select a start date</div>
        <button class="bk-picker-x" id="bkPickerClose"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="bk-picker-months" id="bkPickerMonths"></div>
      <div class="bk-picker-foot">
        <div class="bk-qpicks">
          <button class="bk-qpick active" data-weeks="2">2 Weeks</button>
          <button class="bk-qpick" data-weeks="4">4 Weeks</button>
        </div>
        <button class="bk-picker-ok" id="bkPickerOk">Confirm</button>
      </div>
    </div>

  </div><!-- /.bk-modal -->
</div>

</body>
</html>
