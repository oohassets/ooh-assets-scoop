<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Inventory</title>
</head>
<body>

<!-- Combined sticky header: title + circuit tabs in one bar -->
<div class="ci-sticky-header">
  <div class="ci-header-inner">
    <div class="circuit-tabs">
      <button type="button" class="circuit-tab active" data-tab="digital">Digital</button>
      <button type="button" class="circuit-tab" data-tab="static">Static</button>
      <button type="button" class="circuit-tab" data-tab="activity">Activity</button>
      <button type="button" class="circuit-tab" data-tab="logs">Logs</button>
    </div>
  </div>
</div>

<div class="ci-page">

  <!-- Digital section (default visible) -->
  <div id="digitalSection">
    <div class="carousel-header">
      <div class="carousel-title">Digital Circuits</div>
      <!-- Home base for the shared download button — content-inventory.js's
           tab switcher relocates this same element (appendChild, not a copy;
           duplicate ids would break getElementById) into #staticSection's
           own carousel-header when Static is active, matching its title
           there instead. Hidden entirely for Activity/Logs. -->
      <div class="download-wrap" id="ciDigitalDownloadWrap">
        <button type="button" class="download-btn" id="ciDownloadBtn" title="Download report">
          <span class="material-symbols-outlined">download</span>
        </button>
        <div class="download-dropdown" id="ciDownloadDropdown">
          <button type="button" class="dl-opt" id="ciDownloadPDF">
            <span class="material-symbols-outlined">picture_as_pdf</span>PDF
          </button>
          <button type="button" class="dl-opt" id="ciDownloadExcel">
            <span class="material-symbols-outlined">table_view</span>Excel
          </button>
        </div>
      </div>
    </div>
    <div class="carousel-container reveal">
      <div class="carousel" id="carouselTPI"></div>
    </div>
    <div class="carousel-container reveal">
      <div class="carousel" id="carouselGewan"></div>
    </div>
  </div>

  <!-- Static section (hidden by default) -->
  <div id="staticSection" class="ci-hidden">
    <div class="carousel-header">
      <div class="carousel-title">Static Circuits</div>
    </div>
    <div class="carousel-container reveal">
      <div class="carousel" id="carouselStatic"></div>
    </div>
  </div>

  <!-- Campaign Activity section (hidden by default) -->
  <div id="activitySection" class="ci-hidden">
    <div class="ci-activity-grid reveal" id="ciActivityGrid"></div>
  </div>

  <!-- Campaign Logs section (hidden by default) — height-locked to the
       viewport (see content-inventory.css) so only the table scrolls, the
       page itself doesn't. -->
  <div id="logsSection" class="ci-hidden">
    <div class="ci-toolbar">
      <div class="ci-search-box">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="logsSearch" placeholder="Search client, circuit, BO…" autocomplete="off">
        <div class="ci-search-drop" id="logsSearchSuggest"></div>
      </div>

      <div class="ci-date-filter-wrap">
        <select class="date-modern" id="logsDateFilterSelect" aria-label="Filter logs by date range"></select>
      </div>
      <div class="ci-date-range-inputs" id="logsDateRangeInputs" hidden>
        <input type="date" class="date-modern" id="logsDateFrom">
        <span class="ci-date-range-arrow material-symbols-outlined">arrow_forward</span>
        <input type="date" class="date-modern" id="logsDateTo">
        <button type="button" class="ci-date-apply-btn" id="logsApplyCustomDate">Apply</button>
      </div>

      <div class="ci-filter-box">
        <select id="logsTypeFilter" aria-label="Filter logs by type">
          <option value="">All Types</option>
          <option value="Add">Add</option>
          <option value="Removed">Removed</option>
        </select>
      </div>

      <div class="download-wrap">
        <button type="button" class="download-btn" id="logsDownloadBtn" title="Download report">
          <span class="material-symbols-outlined">download</span>
        </button>
        <div class="download-dropdown" id="logsDownloadDropdown">
          <button type="button" class="dl-opt" id="logsDownloadPDF">
            <span class="material-symbols-outlined">picture_as_pdf</span>PDF
          </button>
          <button type="button" class="dl-opt" id="logsDownloadExcel">
            <span class="material-symbols-outlined">table_view</span>Excel
          </button>
        </div>
      </div>
    </div>

    <div class="ci-logs-card">
      <div class="table-container ci-logs-table-container">
        <table class="ci-logs-table">
          <thead>
            <tr>
              <th class="th-sortable" data-sort="Date" role="button" tabindex="0" aria-label="Sort by Date"><span class="th-sort-label">Date<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="Type" role="button" tabindex="0" aria-label="Sort by Type"><span class="th-sort-label">Type<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="BO" role="button" tabindex="0" aria-label="Sort by BO"><span class="th-sort-label">BO<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="Client" role="button" tabindex="0" aria-label="Sort by Client"><span class="th-sort-label">Client<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="Circuits" role="button" tabindex="0" aria-label="Sort by Circuits"><span class="th-sort-label">Circuits<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="Start Date" role="button" tabindex="0" aria-label="Sort by Start Date"><span class="th-sort-label">Start Date<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="th-sortable" data-sort="End Date" role="button" tabindex="0" aria-label="Sort by End Date"><span class="th-sort-label">End Date<span class="material-symbols-outlined th-sort-icon">unfold_more</span></span></th>
              <th class="ci-actions-col ci-hidden" id="logsActionsTh"><button type="button" class="ci-more-btn" id="logsMoreBtn" aria-label="Row options"><span class="material-symbols-outlined">more_vert</span></button></th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            <tr><td colspan="7" class="ci-logs-loading">Loading campaign logs…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

</body>
</html>
