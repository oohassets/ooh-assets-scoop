<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Inventory</title>
</head>
<body>



<div class="container">

  <!-- Circuit tab buttons -->
  <div class="circuit-tabs">
    <button class="circuit-tab active" data-tab="digital">Digital</button>
    <button class="circuit-tab" data-tab="static">Static</button>
    <button class="circuit-tab" data-tab="activity">Activity</button>
  </div>

  <!-- Digital section (default visible) -->
  <div id="digitalSection">
    <div class="carousel-header">
      <div class="carousel-title">Digital Circuits</div>
    </div>
    <div class="carousel-container">
      <div class="carousel" id="carouselTPI"></div>
    </div>
    <div class="carousel-container">
      <div class="carousel" id="carouselGewan"></div>
    </div>
  </div>

  <!-- Static section (hidden by default) -->
  <div id="staticSection" style="display:none;">
    <div class="carousel-header">
      <div class="carousel-title">Static Circuits</div>
    </div>
    <div class="carousel-container">
      <div class="carousel" id="carouselStatic"></div>
    </div>
  </div>

  <!-- Campaign Activity section (hidden by default) -->
  <div id="activitySection" style="display:none;">
    <div class="carousel-title">Campaign Activity</div>
    <div class="carousel-container">
      <div class="carousel" id="carouselPublishToday"></div>
    </div>
    <div class="carousel-title">Ending &amp; Upcoming Campaigns</div>
    <div class="carousel-container">
      <div class="carousel" id="carouselUpcoming"></div>
    </div>
  </div>

</div>

</body>
</html>
