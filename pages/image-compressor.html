<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Image Compressor</title>
<link rel="icon" href="../images/scooplogo_black_192x192.png">
<link rel="stylesheet" href="../assets/css/theme.css">
<link rel="stylesheet" href="../assets/css/image-compressor.css">
<script>(function(){const t=localStorage.getItem("scoop-theme");if(t)document.documentElement.setAttribute("data-theme",t);window.addEventListener("message",function(e){if(e.data&&e.data.type==="scoop-theme"){document.documentElement.setAttribute("data-theme",e.data.theme);localStorage.setItem("scoop-theme",e.data.theme);}});})();</script>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <h1>Bulk Image Compressor</h1>

  <div>
    <div class="upload-btn" id="uploadBtn">
      Upload Images (<span id="count">0</span>)
    </div>
    <div class="download-all" id="downloadAll">
      Download All
    </div>
  </div>

  <input type="file" id="fileInput" multiple accept="image/*">
  <div class="images" id="imageList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let compressed = [];
let completed = 0;
let total = 0;

const uploadBtn = document.getElementById('uploadBtn');
const downloadAllBtn = document.getElementById('downloadAll');
const fileInput = document.getElementById('fileInput');
const imageList = document.getElementById('imageList');
const count = document.getElementById('count');

uploadBtn.onclick = () => {
  fileInput.value = '';
  fileInput.click();
};

downloadAllBtn.onclick = async () => {

  // ✅ CASE 1: 10 files or less → normal download
  if (compressed.length <= 10) {
    compressed.forEach(f => {
      const a = document.createElement('a');
      a.href = f.url;
      a.download = f.name;
      a.click();
    });
    return;
  }

  // ✅ CASE 2: More than 10 files → ZIP
  const zip = new JSZip();
  const folder = zip.folder("compressed-images");

  for (const file of compressed) {
    const response = await fetch(file.url);
    const blob = await response.blob();
    folder.file(file.name, blob);
  }

  const zipBlob = await zip.generateAsync({ type: "blob" });
  const zipUrl = URL.createObjectURL(zipBlob);

  const a = document.createElement('a');
  a.href = zipUrl;
  a.download = "compressed-images.zip";
  a.click();

  URL.revokeObjectURL(zipUrl);
};


fileInput.onchange = e => {
  imageList.innerHTML = '';
  compressed = [];
  completed = 0;
  total = e.target.files.length;
  count.textContent = total;
  downloadAllBtn.style.display = 'none';

  [...e.target.files].forEach((file, i) => createItem(file, i));
};

function createItem(file, i) {
  const div = document.createElement('div');
  div.className = 'image-item';
  div.innerHTML = `
    <strong>${file.name}</strong>
    <div class="progress-bar">
      <div class="progress-fill" id="p-${i}"></div>
    </div>
    <div class="image-actions">
      <span id="s-${i}">Compressing…</span>
      <button class="download-btn" id="d-${i}" disabled>Download</button>
    </div>
  `;
  imageList.appendChild(div);
  compress(file, i);
}

function update(i, v) {
  document.getElementById(`p-${i}`).style.width = v + '%';
}

function compress(file, i) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);

      let quality = 0.95;
      const MAX = 1024 * 1024;

      function loop() {
        canvas.toBlob(blob => {
          if (!blob) return;

          if (blob.size <= MAX || quality <= 0.4) {
            update(i, 100);

            const name = file.name.replace(/\.[^/.]+$/, '') + '.jpg';
            const url = URL.createObjectURL(blob);
            compressed.push({ url, name });

            completed++;
            document.getElementById(`s-${i}`).textContent =
              (blob.size / 1024).toFixed(0) + ' KB';

            const btn = document.getElementById(`d-${i}`);
            btn.disabled = false;
            btn.onclick = () => {
              const a = document.createElement('a');
              a.href = url;
              a.download = name;
              a.click();
            };

            if (completed === total) {
              downloadAllBtn.style.display = 'inline-block';
            }
          } else {
            quality -= 0.03;
            update(i, quality * 100);
            loop();
          }
        }, 'image/jpeg', quality);
      }
      loop();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
