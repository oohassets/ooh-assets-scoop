<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Traffic Dashboard</title>

<style>
body{
  font-family:'Segoe UI', Arial;
  background:var(--bg-primary);
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
  color:var(--text-primary);
}

.top-bar{
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
  text-align:center;
}

input,button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ddd;
}

.date-modern {
  width: 120px;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  font-size: 13px;
  transition: 0.2s;
}
.date-modern:hover { border-color: #ff9f50; }
.date-modern:focus { outline:none; border-color:#ff9f50; box-shadow:0 0 0 2px rgba(255,159,80,0.2); }

button{
  background: linear-gradient(135deg, #ff9f50, #e26b20);
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-weight: bold;
  transition: 0.3s;
  font-size: 14px;
}
button:hover { opacity: 0.9; }
button:disabled { opacity: 0.5; cursor: default; }

#daysCount{
  font-weight:bold;
  padding:8px 12px;
  color:var(--text-primary);
}

.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px; padding: 20px;
}

.card{
  background:var(--bg-card);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow-card);
  transition:background 0.4s, border-color 0.3s, transform 0.3s;
  position:relative;
  border:1px solid var(--border-glass);
}
.card:hover{ transform:translateY(-4px); border-bottom:2px solid #e26b20; }

.card h3{
  font-size:14px;
  margin-top:5px;
  margin-bottom:5px;
  color:var(--text-secondary);
  display:flex;
  justify-content:space-between;
}

.big{ font-size:22px; font-weight:700; color:var(--text-primary); margin-bottom:10px; }

.metric{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  margin:6px 0;
  color:var(--text-secondary);
}
.metric .label{ display:flex; align-items:center; gap:6px; white-space:nowrap; }
.metric .value{ text-align:right; }
.metric .material-symbols-outlined{ font-size:16px !important; opacity:0.7; width:16px !important; height:16px !important; }

#chartContainer{
  margin:30px;
  background:var(--bg-card);
  border-radius:16px;
  padding:20px;
  box-shadow:var(--shadow-card);
  border:1px solid var(--border-glass);
  transition:background 0.4s;
}
#vehicleChart{ width:100% !important; height:400px !important; }

#totalKPI{ display:flex; justify-content:center; margin-bottom:10px; }
.kpi-box{
  background:var(--bg-card);
  padding:12px 18px;
  border-radius:14px;
  box-shadow:var(--shadow-card);
  text-align:center;
  border:1px solid var(--border-glass);
  transition:background 0.4s;
}
.kpi-title{ font-size:12px; color:var(--text-muted); margin-bottom:4px; }
.kpi-values{ display:flex; gap:15px; font-size:13px; color:var(--text-primary); }
.kpi-total{ font-size:13px; }
</style>
</head>

<body>

<h1>Vehicle Traffic Dashboard</h1>

<div class="top-bar">
  From <input type="date" class="date-modern" id="dateFrom">
  To <input type="date" class="date-modern" id="dateTo">
  <button id="loadBtn" disabled>Load</button>
  <div id="daysCount">Days: -</div>
</div>

<div id="totalKPI">
  <div class="kpi-box">
    <div class="kpi-title">Total Vehicles</div>
    <div class="kpi-values">
      <div>The Pearl Island: <span id="kpiTPI">0</span></div>
      <div>Gewan Island: <span id="kpiGewan">0</span></div>
      <div class="kpi-total">Combined: <span id="kpiAll">0</span></div>
    </div>
  </div>
</div>

<div class="cards" id="cardsContainer"></div>

<div id="chartContainer">
  <canvas id="vehicleChart"></canvas>
</div>

</body>
</html>
