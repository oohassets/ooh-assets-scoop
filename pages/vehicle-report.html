<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Traffic Dashboard</title>
</head>

<body>
<div class="vr-page">

<div class="vr-top-row">
  <div class="vr-toolbar">
    <div class="vr-daterange">
      <div class="vr-daterange-label">
        <span class="material-symbols-outlined">calendar_month</span> Date Range
      </div>

      <div class="vr-select-group">
        <label for="monthSelect">Month</label>
        <select class="date-modern" id="monthSelect"></select>
      </div>

      <div class="vr-select-row" id="rangeRow" hidden>
        <div class="vr-select-group">
          <label for="dateFrom">From</label>
          <input type="date" class="date-modern" id="dateFrom">
        </div>
        <span class="vr-range-arrow material-symbols-outlined">arrow_forward</span>
        <div class="vr-select-group">
          <label for="dateTo">To</label>
          <input type="date" class="date-modern" id="dateTo">
        </div>
      </div>
    </div>

    <div class="vr-toolbar-actions">
      <div class="vr-days-chip">
        <span class="vr-days-label">Total Days</span>
        <span class="vr-days-value" id="daysCount">-</span>
      </div>
      <div class="download-wrap">
        <button class="download-btn" id="vrDownloadBtn" title="Download report (PDF)">
          <span class="material-symbols-outlined">download</span>
        </button>
      </div>
    </div>
  </div>

  <div class="vr-slicer" id="circuitSlicer"></div>

  <div class="kpi-box" id="totalKPI">
    <div class="kpi-title"><span class="material-symbols-outlined">directions_car</span> Total Vehicles</div>
    <div class="kpi-donut-wrap">
      <canvas id="kpiDonut"></canvas>
      <div class="kpi-donut-center">
        <span class="kpi-donut-total" id="kpiAll">0</span>
        <span class="kpi-donut-sublabel">Combined</span>
      </div>
    </div>
    <div class="kpi-legend">
      <div class="kpi-legend-item"><span class="kpi-dot kpi-dot-tpi"></span> The Pearl Island <strong id="kpiTPI">0</strong></div>
      <div class="kpi-legend-item"><span class="kpi-dot kpi-dot-gewan"></span> Gewan Island <strong id="kpiGewan">0</strong></div>
    </div>
    <div class="kpi-avg-row">
      <span class="material-symbols-outlined">speed</span>
      <span class="kpi-avg-label">Avg / Day</span>
      <span class="kpi-avg-value" id="kpiAvgDay">0</span>
    </div>
  </div>

  <div class="kpi-box circuit-rank-box" id="circuitRankBox">
    <div class="kpi-title">Impressions by Circuit</div>
    <div class="circuit-rank-wrap">
      <canvas id="circuitRankChart"></canvas>
    </div>
    <div class="circuit-rank-total">
      <span class="circuit-rank-total-label">Total Impressions</span>
      <span class="circuit-rank-total-value" id="circuitRankTotal">0</span>
    </div>
  </div>
</div>

<div class="cards" id="cardsContainer"></div>

<div id="chartContainer">
  <canvas id="vehicleChart"></canvas>
</div>

</div>
</body>
</html>
