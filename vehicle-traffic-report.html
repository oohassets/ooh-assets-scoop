<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Traffic Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<body style="display:none;">

<script type="module">
  import { requireAuth } from "./assets/js/authGuard.js";
  requireAuth();
</script>


<style>

body{
  font-family:'Segoe UI', Arial;
  background:#f6f8fc;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

.top-bar{
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
  text-align:center;
}

input,button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ddd;
}

.date-modern {
    width: 120px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    font-size: 13px;
    transition: 0.2s;
}
.date-modern:hover {
    border-color: #ff9f50;
}
.date-modern:focus {
    outline: none;
    border-color: #ff9f50;
    box-shadow: 0 0 0 2px rgba(255,159,80,0.2);
}

button{
    background: linear-gradient(135deg, #ff9f50, #e26b20);
    padding: 10px 20px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-weight: bold;
    transition: 0.3s;
    font-size: 14px;
}

button:hover {
    opacity: 0.9;
}

#daysCount{
  font-weight:bold;
  padding:8px 12px;
}

.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  border-bottom: 2px solid #e26b20;
}

.card .icon{
  position:absolute;
  top:15px;
  right:15px;
  font-size:28px;
  color:#ddd;
}

.card h3{
  font-size:14px;
  margin-top:5px;
  margin-bottom:5px;
  color:#666;
  display:flex;
  justify-content:space-between;
}

.big{
  font-size:22px;
  font-weight:700;
  color:#111;
  margin-bottom:10px;
}

.metric {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin: 6px 0;
  color: #555;
}

/* LEFT SIDE */
.metric .label {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

/* RIGHT SIDE */
.metric .value {
  /* font-weight: 600; */
  text-align: right;
}

/* ICON */
.material-icons {
  font-size: 16px;
  opacity: 0.7;
}

#chartContainer{
  margin-top:30px;
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

#vehicleChart{
  width:100% !important;
  height:400px !important;
}

/* ✅ ONLY NEW (KPI STYLE) */
#totalKPI{
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

.kpi-box{
  background:white;
  padding:12px 18px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  text-align:center;
}

.kpi-title{
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}

.kpi-values{
  display:flex;
  gap:15px;
  font-size:13px;
}

.kpi-total{
  font-size:13px;
}
</style>
</head>

<body>

<h1>Vehicle Traffic Dashboard</h1>

<div class="top-bar">
  From <input type="date" class="date-modern" id="dateFrom" onchange="updateDaysCount()">
  To <input type="date" class="date-modern" id="dateTo" onchange="updateDaysCount()">
  <button id="loadBtn" onclick="loadData()" disabled>Load</button>
  <div id="daysCount">Days: -</div>
</div>

<!-- ✅ KPI (NEW ONLY) -->
<div id="totalKPI">
  <div class="kpi-box">
    <div class="kpi-title">Total Vehicles</div>
    <div class="kpi-values">
      <div>The Pearl Island: <span id="kpiTPI">0</span></div>
      <div>Gewan Island: <span id="kpiGewan">0</span></div>
      <div class="kpi-total">Combined: <span id="kpiAll">0</span></div>
    </div>
  </div>
</div>

<div class="cards" id="cardsContainer"></div>

<div id="chartContainer">
  <canvas id="vehicleChart"></canvas>
</div>

<script>

/* ================= 🔥 FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyA4amK6CZuiU3_Nfaw4OLD17BqWrX0VYAA",
  databaseURL: "https://scoopassets-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const dbRef = firebase.database().ref("vehiclecounts");

/* ✅ SINGLE AUTH LISTENER */
auth.onAuthStateChanged(user => {
  if (user) {
    console.log("Authenticated:", user.email);
    document.getElementById("loadBtn").disabled = false;
  } else {
    window.location.href = "login.html";
  }
});

function parseMDY(dateStr) {
  if (!dateStr) return null;

  const [month, day, year] = dateStr.split('/').map(Number);

  return new Date(year, month - 1, day);
}

function parsePickerDate(dateStr) {
  if (!dateStr) return null;

  const [year, month, day] = dateStr.split('-').map(Number);

  return new Date(year, month - 1, day);
}


const adsPerMinute = 6;
const personPerCar = 2;
let chart;
let shouldAnimateKPI = false;

// CONFIG
const screenConfig = [
  {name:"Underpass", screens:1, source:"tpi", icon:"directions_car"},
  {name:"Digital Mupi", screens:12, source:"tpi", icon:"tv"},
  {name:"UDC Tower", screens:1, source:"tpi", icon:"apartment"},
  {name:"Qanat Quartier", screens:1, source:"tpi", icon:"location_city"},
  {name:"Gewan Crystal Walk", screens:12, source:"gewan", icon:"storefront"}
];

// ✅ KPI SYNC
function animateKPI(progress, totals){
  document.getElementById("kpiTPI").innerText =
    Math.floor(progress * totals.tpi).toLocaleString();
  document.getElementById("kpiGewan").innerText =
    Math.floor(progress * totals.gewan).toLocaleString();
  document.getElementById("kpiAll").innerText =
    Math.floor(progress * totals.all).toLocaleString();
}

// Days
function updateDaysCount(){
  const dateFrom = document.getElementById("dateFrom");
  const dateTo = document.getElementById("dateTo");
  const daysCount = document.getElementById("daysCount");

  const from = parsePickerDate(dateFrom.value);
  const to = parsePickerDate(dateTo.value);

  if(isNaN(from) || isNaN(to)) {
    daysCount.innerText = "Days: -";
    return;
  }

  const diff = Math.floor((to - from) / (1000 * 60 * 60 * 24)) + 1;
  daysCount.innerText = "Days: " + diff;
}

// Load
async function loadData(){
  const dateFrom = document.getElementById("dateFrom");
  const dateTo = document.getElementById("dateTo");

  const from = parsePickerDate(dateFrom.value);
  const to = parsePickerDate(dateTo.value);

  from.setHours(0,0,0,0);
  to.setHours(23,59,59,999);

  const snap = await dbRef.once('value');
  const allData = snap.val();

  console.log("Firebase raw data:", allData);

  if (!allData) {
    console.warn("No data found at vehiclecounts");
    return;
  }

  let tpi=[], gewan=[];

  for(let key in allData){
    let d = allData[key];
    let date = parseMDY(
      d.ContentDate || d["Content.Date"]
    );

    if (!date) continue;

    date.setHours(12,0,0,0); // avoid timezone edge cases

    if (date < from || date > to) continue;

    if(d.Name && d.Name.toUpperCase().includes("TPI")) tpi.push(d);
    if(d.Name && d.Name.toUpperCase().includes("GEWAN")) gewan.push(d);
  }

  shouldAnimateKPI = true;

  console.log(
    "GEWAN records:",
    gewan.length,
    gewan.map(x => x.ContentDate)
  );

  console.log(
    "TPI records:",
    tpi.length,
    tpi.map(x => x.ContentDate)
  );

  renderCards(tpi, gewan);
  renderChart(tpi, gewan);
}

// Cards (UNCHANGED)
function renderCards(tpiData, gewanData){
  const container = document.getElementById("cardsContainer");
  container.innerHTML="";

  screenConfig.forEach(loc=>{
    const data = loc.source==="tpi"?tpiData:gewanData;

    if(!data.length){
      container.innerHTML += createCard(loc,"-","-","-","-");
      return;
    }

    const from = parsePickerDate(
      document.getElementById("dateFrom").value
    );

    const to = parsePickerDate(
      document.getElementById("dateTo").value
    );

    const days =
      Math.floor((to - from) / (1000 * 60 * 60 * 24)) + 1;
      
    console.log(loc.name, "days =", days);

    let total = data.reduce((s,x)=>s+Number(x.ContentTotal||0),0);
    
    let avg = Math.round(total/days);

    let persons = total * personPerCar;
    let avgPersons = Math.round(persons/days);

    let impDay = Math.round((avgPersons/adsPerMinute)*loc.screens);
    let totalImp = impDay * days;

    container.innerHTML += createCard(loc,totalImp,impDay,avg,avgPersons);
  });
}

function createCard(loc,totalImp,impDay,avg,avgPersons){
  return `
  <div class="card">
    <h3>${loc.name}</h3>

    <div class="big">${format(totalImp)}</div>

    <div class="metric">
      <div class="label">
        <span class="material-icons">airplay</span>
        Screens
      </div>
      <div class="value">${loc.screens}</div>
    </div>

    <div class="metric">
      <div class="label">
        <span class="material-icons">visibility</span>
        Impression/day
      </div>
      <div class="value">${format(impDay)}</div>
    </div>

    <div class="metric">
      <div class="label">
        <span class="material-icons">directions_car</span>
        Avg Traffic
      </div>
      <div class="value">${format(avg)}</div>
    </div>

    <div class="metric">
      <div class="label">
        <span class="material-icons">accessibility</span>
        Avg Persons/day
      </div>
      <div class="value">${format(avgPersons)}</div>
    </div>

  </div>`;
}

function format(val){
  return val==="-"? "-" : Number(val).toLocaleString();
}

// Chart (ONLY KPI SYNC ADDED)
function renderChart(tpiData, gewanData){

  const labels = Array.from(new Set([...tpiData.map(d=>d.ContentDate||d["Content.Date"]),...gewanData.map(d=>d.ContentDate||d["Content.Date"])]))
    .sort((a,b)=>new Date(a)-new Date(b))
    .map(d=>new Date(d).toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'}));

  const tpiCounts = labels.map(l=>{
    const row = tpiData.find(d=>{
      const date = new Date(d.ContentDate||d["Content.Date"]);
      return date.toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'})===l;
    });
    return row?Number(row.ContentTotal||row["Content.Total"]||0):0;
  });

  const gewanCounts = labels.map(l=>{
    const row = gewanData.find(d=>{
      const date = new Date(d.ContentDate||d["Content.Date"]);
      return date.toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'})===l;
    });
    return row?Number(row.ContentTotal||row["Content.Total"]||0):0;
  });

  const totals = {
    tpi: tpiCounts.reduce((a,b)=>a+b,0),
    gewan: gewanCounts.reduce((a,b)=>a+b,0)
  };
  totals.all = totals.tpi + totals.gewan;

  const ctx = document.getElementById('vehicleChart').getContext('2d');
  if(chart) chart.destroy();

  const isMobile = window.innerWidth < 768;

  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: labels,
      datasets: isMobile ? [
        {label:'Gewan Vehicles', data:gewanCounts, backgroundColor:'rgba(33,150,243,0.6)', borderColor:'rgba(33,150,243,1)', borderWidth:1},
        {label:'TPI Vehicles', data:tpiCounts, backgroundColor:'rgba(76,175,80,0.6)', borderColor:'rgba(76,175,80,1)', borderWidth:1}
      ] : [
        {label:'TPI Vehicles', data:tpiCounts, backgroundColor:'rgba(76,175,80,0.6)', borderColor:'rgba(76,175,80,1)', borderWidth:1},
        {label:'Gewan Vehicles', data:gewanCounts, backgroundColor:'rgba(33,150,243,0.6)', borderColor:'rgba(33,150,243,1)', borderWidth:1}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{
        duration:1200,
        easing:'easeOutQuart',
        onProgress:(anim)=>{
          if(!shouldAnimateKPI) return;
          animateKPI(anim.currentStep/anim.numSteps, totals);
        },
        onComplete:()=>{
          if(shouldAnimateKPI){
            animateKPI(1, totals);
            shouldAnimateKPI = false;
          }
        }
      },
      plugins:{
        legend:{position:'top'},
        title:{display:true,text:'Vehicle Traffic per Day'},
        tooltip:{
          enabled:true,
          mode:'index',
          intersect:false
        }
      },
      scales:{
        x:{stacked:isMobile},
        y:{stacked:isMobile, beginAtZero:true}
      }
    }
  });
}
</script>

</body>
</html>
