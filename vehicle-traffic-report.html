<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Traffic Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{
  font-family:'Segoe UI', Arial;
  background:#f6f8fc;
  margin:0;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

/* CONTROLS */
.top-bar{
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
  text-align:center;
}

input,button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#4CAF50;
  color:white;
  border:none;
  cursor:pointer;
}

#daysCount{
  font-weight:bold;
  padding:8px 12px;
}

/* GRID */
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* KPI CARD */
.card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
}

/* ICON */
.card .icon{
  position:absolute;
  top:15px;
  right:15px;
  font-size:28px;
  color:#ddd;
}

/* TITLE */
.card h3{
  font-size:14px;
  margin-top:5px;
  margin-bottom:5px;
  color:#666;
  display:flex;
  justify-content:space-between;
}

/* BIG KPI */
.big{
  font-size:22px;
  font-weight:700;
  color:#111;
  margin-bottom:10px;
}

/* SUB METRICS */
.metric{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:3px 0;
  color:#555;
}

/* CHART */
#chartContainer{
  margin-top:30px;
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

#vehicleChart{
  width:100% !important;
  height:400px !important;
}
</style>
</head>

<body>

<h1>Vehicle Traffic Dashboard</h1>

<div class="top-bar">
  From <input type="date" id="dateFrom" onchange="updateDaysCount()">
  To <input type="date" id="dateTo" onchange="updateDaysCount()">
  <button onclick="loadData()">Load</button>
  <div id="daysCount">Days: -</div>
</div>

<div class="cards" id="cardsContainer"></div>

<div id="chartContainer">
  <canvas id="vehicleChart"></canvas>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyA4amK6CZuiU3_Nfaw4OLD17BqWrX0VYAA",
  databaseURL: "https://scoopassets-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const dbRef = firebase.database().ref('vehiclecounts');

const adsPerMinute = 6;
const personPerCar = 2;
let chart;

// CONFIG WITH ICONS
const screenConfig = [
  {name:"Underpass", screens:1, source:"tpi", icon:"directions_car"},
  {name:"Digital Mupi", screens:12, source:"tpi", icon:"tv"},
  {name:"UDC Tower", screens:1, source:"tpi", icon:"apartment"},
  {name:"Qanat Quartier", screens:1, source:"tpi", icon:"location_city"},
  {name:"Gewan Crystal Walk", screens:12, source:"gewan", icon:"storefront"}
];

// Days
function updateDaysCount(){
  const from = new Date(dateFrom.value);
  const to = new Date(dateTo.value);
  if(isNaN(from)||isNaN(to)) return daysCount.innerText="Days: -";
  const diff = Math.floor((to-from)/(1000*60*60*24))+1;
  daysCount.innerText = "Days: "+diff;
}

// Load
async function loadData(){
  const from = new Date(dateFrom.value);
  const to = new Date(dateTo.value);

  const snap = await dbRef.once('value');
  const allData = snap.val();

  let tpi=[], gewan=[];

  for(let key in allData){
    let d = allData[key];
    let date = new Date(d.ContentDate || d["Content.Date"]);
    if(isNaN(date)||date<from||date>to) continue;

    if(d.Name && d.Name.toUpperCase().includes("TPI")) tpi.push(d);
    if(d.Name && d.Name.toUpperCase().includes("GEWAN")) gewan.push(d);
  }

  renderCards(tpi, gewan);
  renderChart(tpi, gewan); // unchanged
}

// Cards
function renderCards(tpiData, gewanData){
  const container = document.getElementById("cardsContainer");
  container.innerHTML="";

  screenConfig.forEach(loc=>{
    const data = loc.source==="tpi"?tpiData:gewanData;

    if(!data.length){
      container.innerHTML += createCard(loc,"-","-","-","-");
      return;
    }

    let days = data.length;
    let total = data.reduce((s,x)=>s+Number(x.ContentTotal||0),0);
    let avg = Math.round(total/days);

    let persons = total * personPerCar;
    let avgPersons = Math.round(persons/days);

    let impDay = Math.round((avgPersons/adsPerMinute)*loc.screens);
    let totalImp = impDay * days;

    container.innerHTML += createCard(loc,totalImp,impDay,avg,avgPersons);
  });
}

function createCard(loc,totalImp,impDay,avg,avgPersons){
  return `
  <div class="card">

    <h3>${loc.name}</h3>

    <div class="big">${format(totalImp)}</div>

    <div class="metric">Impression/day <span>${format(impDay)}</span></div>
    <div class="metric">Avg Traffic <span>${format(avg)}</span></div>
    <div class="metric">Avg Persons/day <span>${format(avgPersons)}</span></div>
  </div>`;
}

function format(val){
  return val==="-"? "-" : Number(val).toLocaleString();
}

// Chart.js
function renderChart(tpiData, gewanData){
  const labels = Array.from(new Set([...tpiData.map(d=>d.ContentDate||d["Content.Date"]),...gewanData.map(d=>d.ContentDate||d["Content.Date"])]))
    .sort((a,b)=>new Date(a)-new Date(b))
    .map(d=>new Date(d).toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'}));

  const tpiCounts = labels.map(l=>{
    const row = tpiData.find(d=>{
      const date = new Date(d.ContentDate||d["Content.Date"]);
      return date.toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'})===l;
    });
    return row?Number(row.ContentTotal||row["Content.Total"]||0):0;
  });

  const gewanCounts = labels.map(l=>{
    const row = gewanData.find(d=>{
      const date = new Date(d.ContentDate||d["Content.Date"]);
      return date.toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'})===l;
    });
    return row?Number(row.ContentTotal||row["Content.Total"]||0):0;
  });

  const ctx = document.getElementById('vehicleChart').getContext('2d');
  if(chart) chart.destroy();

  // Detect mobile
  const isMobile = window.innerWidth < 768;

  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: labels,
      datasets: isMobile ? [
        {label:'Gewan Vehicles', data:gewanCounts, backgroundColor:'rgba(33,150,243,0.6)', borderColor:'rgba(33,150,243,1)', borderWidth:1},
        {label:'TPI Vehicles', data:tpiCounts, backgroundColor:'rgba(76,175,80,0.6)', borderColor:'rgba(76,175,80,1)', borderWidth:1}
      ] : [
        {label:'TPI Vehicles', data:tpiCounts, backgroundColor:'rgba(76,175,80,0.6)', borderColor:'rgba(76,175,80,1)', borderWidth:1},
        {label:'Gewan Vehicles', data:gewanCounts, backgroundColor:'rgba(33,150,243,0.6)', borderColor:'rgba(33,150,243,1)', borderWidth:1}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{position:'top'},
        title:{display:true,text:'Vehicle Traffic per Day'},
        tooltip:{
          enabled:true,
          mode:'index',
          intersect:false,
          callbacks:{
            label: function(context){
              return `${context.dataset.label}: ${context.parsed.y.toLocaleString()}`;
            }
          }
        }
      },
      scales:{
        x:{stacked:isMobile, title:{display:true,text:'Date'}},
        y:{stacked:isMobile, beginAtZero:true, title:{display:true,text:'Vehicles'}}
      }
    }
  });
}
window.addEventListener('resize',()=>{
  if(chart){
    chart.options.scales.x.stacked = window.innerWidth<768;
    chart.options.scales.y.stacked = window.innerWidth<768;
    chart.update();
  }
});

</script>

</body>
</html>
